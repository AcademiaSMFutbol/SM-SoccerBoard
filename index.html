
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #app { display: flex; height: 600px; background: #1a2a3a; border-radius: var(--border-radius-lg); overflow: hidden; }
  #sidebar { width: 220px; background: #243447; display: flex; flex-direction: column; flex-shrink: 0; }
  #brand { padding: 12px 16px; font-size: 13px; font-weight: 500; color: #fff; background: #1a2a3a; border-bottom: 1px solid #1a2a3a; letter-spacing: 0.5px; }
  .tabs { display: flex; background: #1a2a3a; }
  .tab { flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 500; color: #7a9ab0; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
  .tab.active { color: #fff; border-bottom: 2px solid #4a9eff; background: #243447; }
  .tab-panel { display: none; flex: 1; padding: 12px; gap: 8px; flex-wrap: wrap; align-content: flex-start; overflow-y: auto; }
  .tab-panel.active { display: flex; }
  .piece { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 80px; height: 72px; border-radius: 8px; cursor: grab; border: 1.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); gap: 5px; user-select: none; transition: border-color 0.15s; }
  .piece:hover { border-color: #4a9eff; }
  .piece span { font-size: 10px; color: #aabbc9; text-align: center; line-height: 1.2; }
  .piece-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
  #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #162030; position: relative; }
  #cvs { display: block; cursor: crosshair; border: 3px solid #243447; border-radius: 4px; }
  #controls { padding: 10px; background: #1a2a3a; display: flex; flex-direction: column; gap: 6px; }
  .ctrl-row { display: flex; gap: 6px; }
  .btn { flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 500; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-green { background: #2ecc71; color: #fff; }
  .btn-red { background: #e74c3c; color: #fff; }
  .btn-gray { background: #5a6d7a; color: #fff; }
  .mode-row { display: flex; gap: 4px; }
  .mode-btn { flex: 1; padding: 6px 2px; font-size: 10px; border: 1.5px solid rgba(255,255,255,0.12); background: none; color: #7a9ab0; border-radius: 5px; cursor: pointer; }
  .mode-btn.active { background: #4a9eff22; border-color: #4a9eff; color: #fff; }
  #tooltip { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
  #tooltip.show { opacity: 1; }
</style>

<div id="app">
  <div id="sidebar">
    <div id="brand">⚽ PIZARRA PMV</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('jug',this)">JUG</button>
      <button class="tab" onclick="switchTab('mat',this)">MAT</button>
      <button class="tab" onclick="switchTab('esp',this)">ESP</button>
    </div>

    <div id="tab-jug" class="tab-panel active">
      <div class="piece" draggable="true" data-type="local">
        <div class="piece-icon"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="#e74c3c" stroke="white" stroke-width="2"/><circle cx="17" cy="13" r="4" fill="white" opacity="0.8"/><path d="M9 26c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="white" opacity="0.8"/></svg></div>
        <span>Local</span>
      </div>
      <div class="piece" draggable="true" data-type="visit">
        <div class="piece-icon"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="#3498db" stroke="white" stroke-width="2"/><circle cx="17" cy="13" r="4" fill="white" opacity="0.8"/><path d="M9 26c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="white" opacity="0.8"/></svg></div>
        <span>Visitante</span>
      </div>
      <div class="piece" draggable="true" data-type="portero-local">
        <div class="piece-icon"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="#e67e22" stroke="white" stroke-width="2"/><text x="17" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">P</text></svg></div>
        <span>Portero L</span>
      </div>
      <div class="piece" draggable="true" data-type="portero-visit">
        <div class="piece-icon"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="#8e44ad" stroke="white" stroke-width="2"/><text x="17" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">P</text></svg></div>
        <span>Portero V</span>
      </div>
      <div class="piece" draggable="true" data-type="ball">
        <div class="piece-icon"><svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="white" stroke="#333" stroke-width="1.5"/><polygon points="14,5 9,9 9,16 14,20 19,16 19,9" fill="#333" opacity="0.85"/><circle cx="14" cy="14" r="3" fill="#333" opacity="0.85"/></svg></div>
        <span>Balón</span>
      </div>
    </div>

    <div id="tab-mat" class="tab-panel">
      <div class="piece" draggable="true" data-type="cone">
        <div class="piece-icon"><svg width="30" height="30" viewBox="0 0 30 30"><polygon points="15,4 4,26 26,26" fill="#f1c40f" stroke="#d4a017" stroke-width="1.5"/><line x1="4" y1="26" x2="26" y2="26" stroke="#d4a017" stroke-width="3"/></svg></div>
        <span>Cono</span>
      </div>
      <div class="piece" draggable="true" data-type="pica">
        <div class="piece-icon"><svg width="30" height="30" viewBox="0 0 30 30"><rect x="13" y="2" width="4" height="26" fill="#e74c3c" rx="2"/><ellipse cx="15" cy="29" rx="6" ry="2" fill="#c0392b"/></svg></div>
        <span>Pica</span>
      </div>
      <div class="piece" draggable="true" data-type="mini-porteria">
        <div class="piece-icon"><svg width="34" height="24" viewBox="0 0 34 24"><rect x="2" y="4" width="30" height="18" fill="none" stroke="white" stroke-width="2.5" rx="1"/><line x1="2" y1="22" x2="32" y2="22" stroke="white" stroke-width="3"/></svg></div>
        <span>Mini portería</span>
      </div>
      <div class="piece" draggable="true" data-type="escalera">
        <div class="piece-icon"><svg width="30" height="30" viewBox="0 0 30 30"><rect x="2" y="2" width="26" height="26" fill="none" stroke="#f39c12" stroke-width="1.5"/><line x1="2" y1="9" x2="28" y2="9" stroke="#f39c12" stroke-width="1.5"/><line x1="2" y1="16" x2="28" y2="16" stroke="#f39c12" stroke-width="1.5"/><line x1="2" y1="23" x2="28" y2="23" stroke="#f39c12" stroke-width="1.5"/><line x1="9" y1="2" x2="9" y2="28" stroke="#f39c12" stroke-width="1.5"/><line x1="16" y1="2" x2="16" y2="28" stroke="#f39c12" stroke-width="1.5"/><line x1="23" y1="2" x2="23" y2="28" stroke="#f39c12" stroke-width="1.5"/></svg></div>
        <span>Escalera</span>
      </div>
    </div>

    <div id="tab-esp" class="tab-panel">
      <div class="piece" draggable="true" data-type="zone-blue">
        <div class="piece-icon"><svg width="40" height="28" viewBox="0 0 40 28"><rect x="2" y="2" width="36" height="24" fill="rgba(52,152,219,0.35)" stroke="#3498db" stroke-width="2" rx="3"/></svg></div>
        <span>Zona azul</span>
      </div>
      <div class="piece" draggable="true" data-type="zone-red">
        <div class="piece-icon"><svg width="40" height="28" viewBox="0 0 40 28"><rect x="2" y="2" width="36" height="24" fill="rgba(231,76,60,0.35)" stroke="#e74c3c" stroke-width="2" rx="3"/></svg></div>
        <span>Zona roja</span>
      </div>
      <div class="piece" draggable="true" data-type="zone-yellow">
        <div class="piece-icon"><svg width="40" height="28" viewBox="0 0 40 28"><rect x="2" y="2" width="36" height="24" fill="rgba(241,196,15,0.35)" stroke="#f1c40f" stroke-width="2" rx="3"/></svg></div>
        <span>Zona amarilla</span>
      </div>
    </div>

    <div id="controls">
      <div class="mode-row">
        <button class="mode-btn active" id="mode-place" onclick="setMode('place',this)">Colocar</button>
        <button class="mode-btn" id="mode-move" onclick="setMode('move',this)">Mover</button>
        <button class="mode-btn" id="mode-arrow" onclick="setMode('arrow',this)">Flecha</button>
        <button class="mode-btn" id="mode-del" onclick="setMode('delete',this)">Borrar</button>
      </div>
      <div class="ctrl-row">
        <button class="btn btn-green" onclick="exportPNG()">PNG</button>
        <button class="btn btn-red" onclick="clearAll()">Limpiar</button>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="tooltip">Suelta aquí</div>
    <canvas id="cvs"></canvas>
  </div>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const W = 740, H = 550;
cvs.width = W; cvs.height = H;

let elements = [];
let arrows = [];
let mode = 'place';
let dragType = null;
let dragEl = null;
let dragOff = {x:0,y:0};
let arrowStart = null;
let selectedEl = null;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cvs.style.cursor = m === 'move' ? 'pointer' : m === 'arrow' ? 'crosshair' : m === 'delete' ? 'not-allowed' : 'crosshair';
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

document.querySelectorAll('.piece').forEach(p => {
  p.addEventListener('dragstart', e => {
    dragType = e.currentTarget.dataset.type;
    e.dataTransfer.effectAllowed = 'copy';
  });
});

const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
wrap.addEventListener('drop', e => {
  e.preventDefault();
  if (!dragType) return;
  const r = cvs.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width);
  const y = (e.clientY - r.top) * (H / r.height);
  if (x < 0 || y < 0 || x > W || y > H) return;
  const isZone = dragType.startsWith('zone');
  elements.push({ id: Date.now(), type: dragType, x, y, w: isZone ? 80 : 0, h: isZone ? 56 : 0, label: '' });
  dragType = null;
  redraw();
});

cvs.addEventListener('mousedown', e => {
  const r = cvs.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top) * (H / r.height);

  if (mode === 'move') {
    for (let i = elements.length - 1; i >= 0; i--) {
      if (hitTest(elements[i], mx, my)) {
        dragEl = elements[i];
        dragOff = { x: mx - elements[i].x, y: my - elements[i].y };
        break;
      }
    }
  } else if (mode === 'arrow') {
    arrowStart = { x: mx, y: my };
  } else if (mode === 'delete') {
    for (let i = elements.length - 1; i >= 0; i--) {
      if (hitTest(elements[i], mx, my)) { elements.splice(i, 1); redraw(); return; }
    }
    for (let i = arrows.length - 1; i >= 0; i--) {
      const a = arrows[i];
      const dx = a.x2-a.x1, dy = a.y2-a.y1;
      const len = Math.sqrt(dx*dx+dy*dy);
      const t = ((mx-a.x1)*dx+(my-a.y1)*dy)/(len*len);
      const px = a.x1+t*dx, py = a.y1+t*dy;
      if (t>0 && t<1 && Math.hypot(mx-px,my-py) < 10) { arrows.splice(i,1); redraw(); return; }
    }
  }
});

cvs.addEventListener('mousemove', e => {
  if (!dragEl) return;
  const r = cvs.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top) * (H / r.height);
  dragEl.x = mx - dragOff.x;
  dragEl.y = my - dragOff.y;
  redraw();
});

cvs.addEventListener('mouseup', e => {
  if (dragEl) { dragEl = null; return; }
  if (mode === 'arrow' && arrowStart) {
    const r = cvs.getBoundingClientRect();
    const mx = (e.clientX - r.left) * (W / r.width);
    const my = (e.clientY - r.top) * (H / r.height);
    if (Math.hypot(mx - arrowStart.x, my - arrowStart.y) > 15) {
      arrows.push({ x1: arrowStart.x, y1: arrowStart.y, x2: mx, y2: my, dashed: e.shiftKey });
    }
    arrowStart = null;
    redraw();
  }
});

function hitTest(el, mx, my) {
  if (el.type.startsWith('zone')) {
    return mx > el.x - el.w/2 && mx < el.x + el.w/2 && my > el.y - el.h/2 && my < el.y + el.h/2;
  }
  return Math.hypot(mx - el.x, my - el.y) < 20;
}

function drawPitch() {
  ctx.fillStyle = '#2d8a4e';
  ctx.fillRect(0, 0, W, H);
  const sx = 40, sy = 30, pw = W-80, ph = H-60;
  const stripe = 60;
  for (let i = 0; i < Math.ceil(pw/stripe); i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2d8a4e' : '#279147';
    ctx.fillRect(sx + i*stripe, sy, Math.min(stripe, pw - i*stripe), ph);
  }
  ctx.strokeStyle = 'white'; ctx.lineWidth = 2.5;
  ctx.strokeRect(sx, sy, pw, ph);
  const cx = W/2;
  ctx.beginPath(); ctx.moveTo(cx, sy); ctx.lineTo(cx, sy+ph); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, H/2, 56, 0, 2*Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, H/2, 3, 0, 2*Math.PI); ctx.fillStyle='white'; ctx.fill();
  const ga = ph*0.44, gd = pw*0.13, gd2 = pw*0.22;
  const gy = H/2 - ga/2;
  ctx.strokeRect(sx, gy, gd2, ga);
  ctx.strokeRect(W-sx-gd2, gy, gd2, ga);
  ctx.strokeRect(sx, H/2-ga*0.28, gd, ga*0.55);
  ctx.strokeRect(W-sx-gd, H/2-ga*0.28, gd, ga*0.55);
  const gw = pw*0.085, gh = 10;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(sx-gh, H/2-gw/2, gh, gw);
  ctx.fillRect(W-sx, H/2-gw/2, gh, gw);
  [sx+gd*1.4, W-sx-gd*1.4].forEach(px => {
    ctx.beginPath(); ctx.arc(px, H/2, 4, 0, 2*Math.PI); ctx.fillStyle='white'; ctx.fill();
  });
  ctx.setLineDash([6,6]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(sx+gd*1.4, H/2, 70, -Math.PI*0.7, Math.PI*0.7); ctx.stroke();
  ctx.beginPath(); ctx.arc(W-sx-gd*1.4, H/2, 70, Math.PI*0.3, Math.PI*1.7); ctx.stroke();
  ctx.setLineDash([]);
  [sx+8,W-sx-8].forEach((px,i) => {
    ctx.beginPath(); ctx.arc(px, sy+8+(i===0?0:0), 6, 0, 2*Math.PI);
    ctx.fillStyle='white'; ctx.fill();
  });
}

function drawArrow(ax1,ay1,ax2,ay2, dashed=false) {
  ctx.save();
  ctx.strokeStyle = '#ffe066'; ctx.lineWidth = 2.5;
  if (dashed) ctx.setLineDash([8,5]); else ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(ax1,ay1); ctx.lineTo(ax2,ay2); ctx.stroke();
  ctx.setLineDash([]);
  const ang = Math.atan2(ay2-ay1, ax2-ax1);
  const hs = 12;
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.moveTo(ax2, ay2);
  ctx.lineTo(ax2 - hs*Math.cos(ang-0.4), ay2 - hs*Math.sin(ang-0.4));
  ctx.lineTo(ax2 - hs*Math.cos(ang+0.4), ay2 - hs*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawEl(el) {
  ctx.save();
  switch(el.type) {
    case 'local':
      ctx.beginPath(); ctx.arc(el.x, el.y, 15, 0, 2*Math.PI);
      ctx.fillStyle='#e74c3c'; ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='white'; ctx.font='bold 9px var(--font-sans)'; ctx.textAlign='center';
      ctx.beginPath(); ctx.arc(el.x, el.y-4, 5, 0, 2*Math.PI); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
      ctx.beginPath(); ctx.arc(el.x, el.y+3, 9, Math.PI, 2*Math.PI); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
      break;
    case 'visit':
      ctx.beginPath(); ctx.arc(el.x, el.y, 15, 0, 2*Math.PI);
      ctx.fillStyle='#2980b9'; ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(el.x, el.y-4, 5, 0, 2*Math.PI); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
      ctx.beginPath(); ctx.arc(el.x, el.y+3, 9, Math.PI, 2*Math.PI); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
      break;
    case 'portero-local':
      ctx.beginPath(); ctx.arc(el.x, el.y, 15, 0, 2*Math.PI);
      ctx.fillStyle='#e67e22'; ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='white'; ctx.font='bold 13px var(--font-sans)'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('P', el.x, el.y);
      break;
    case 'portero-visit':
      ctx.beginPath(); ctx.arc(el.x, el.y, 15, 0, 2*Math.PI);
      ctx.fillStyle='#8e44ad'; ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='white'; ctx.font='bold 13px var(--font-sans)'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('P', el.x, el.y);
      break;
    case 'ball':
      ctx.beginPath(); ctx.arc(el.x, el.y, 9, 0, 2*Math.PI);
      ctx.fillStyle='white'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='#222'; ctx.beginPath();
      ctx.arc(el.x, el.y, 4, 0, 2*Math.PI); ctx.fill();
      break;
    case 'cone':
      ctx.beginPath(); ctx.moveTo(el.x, el.y-14); ctx.lineTo(el.x-10, el.y+10); ctx.lineTo(el.x+10, el.y+10); ctx.closePath();
      ctx.fillStyle='#f1c40f'; ctx.fill(); ctx.strokeStyle='#d4a017'; ctx.lineWidth=1.5; ctx.stroke();
      break;
    case 'pica':
      ctx.fillStyle='#e74c3c'; ctx.fillRect(el.x-2, el.y-14, 4, 26);
      ctx.beginPath(); ctx.ellipse(el.x, el.y+13, 6, 2, 0, 0, 2*Math.PI); ctx.fillStyle='#c0392b'; ctx.fill();
      break;
    case 'mini-porteria':
      ctx.strokeStyle='white'; ctx.lineWidth=3;
      ctx.strokeRect(el.x-18, el.y-10, 36, 20);
      break;
    case 'escalera':
      ctx.strokeStyle='#f39c12'; ctx.lineWidth=1.5;
      ctx.strokeRect(el.x-16, el.y-16, 32, 32);
      for (let i=1;i<3;i++) {
        ctx.beginPath(); ctx.moveTo(el.x-16+i*11, el.y-16); ctx.lineTo(el.x-16+i*11, el.y+16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(el.x-16, el.y-16+i*11); ctx.lineTo(el.x+16, el.y-16+i*11); ctx.stroke();
      }
      break;
    case 'zone-blue':
      ctx.fillStyle='rgba(52,152,219,0.3)';
      ctx.fillRect(el.x-el.w/2, el.y-el.h/2, el.w, el.h);
      ctx.strokeStyle='#3498db'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
      ctx.strokeRect(el.x-el.w/2, el.y-el.h/2, el.w, el.h);
      ctx.setLineDash([]);
      break;
    case 'zone-red':
      ctx.fillStyle='rgba(231,76,60,0.28)';
      ctx.fillRect(el.x-el.w/2, el.y-el.h/2, el.w, el.h);
      ctx.strokeStyle='#e74c3c'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
      ctx.strokeRect(el.x-el.w/2, el.y-el.h/2, el.w, el.h);
      ctx.setLineDash([]);
      break;
    case 'zone-yellow':
      ctx.fillStyle='rgba(241,196,15,0.28)';
      ctx.fillRect(el.x-el.w/2, el.y-el.h/2, el.w, el.h);
      ctx.strokeStyle='#f1c40f'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
      ctx.strokeRect(el.x-el.w/2, el.y-el.h/2, el.w, el.h);
      ctx.setLineDash([]);
      break;
  }
  ctx.restore();
}

function redraw() {
  ctx.clearRect(0,0,W,H);
  drawPitch();
  arrows.forEach(a => drawArrow(a.x1,a.y1,a.x2,a.y2,a.dashed));
  elements.forEach(el => drawEl(el));
}

function clearAll() { elements=[]; arrows=[]; redraw(); }

function exportPNG() {
  const link = document.createElement('a');
  link.download = 'tactica.png';
  link.href = cvs.toDataURL('image/png');
  link.click();
}

redraw();
</script>
