<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerBoard Ultra Pro</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --grass: #27ae60; --top: #161d23; --btn-bg: #2d3436; }
        body { margin: 0; background: #000; color: white; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Barra Superior Unificada */
        #top-bar { height: 60px; background: var(--top); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; border-bottom: 2px solid #000; z-index: 100; }
        
        .control-group { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 8px; }
        .top-btn { padding: 8px 12px; border-radius: 6px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 11px; background: var(--btn-bg); transition: 0.2s; }
        .top-btn:active { transform: scale(0.9); }
        .btn-add { background: var(--accent) !important; font-size: 18px !important; padding: 4px 15px !important; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar con Scroll */
        #sidebar { width: 85px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; z-index: 10; }
        .cat-label { font-size: 9px; text-align: center; padding: 10px 0 4px; color: #84817a; font-weight: bold; text-transform: uppercase; }
        .tool-btn { width: 50px; height: 50px; margin: 6px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #3d3d3d; background: var(--btn-bg); flex-shrink: 0; }
        
        /* Canvas Full Display */
        #canvas-wrap { flex: 1; background: var(--grass); position: relative; overflow: hidden; }
        canvas { display: block; touch-action: none; }

        .frame-indicator { color: var(--accent); font-size: 10px; font-weight: bold; margin: 0 5px; min-width: 50px; text-align: center; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="control-group">
        <button class="top-btn" onclick="changeFrame(-1)">◀</button>
        <div class="frame-indicator" id="frame-label">PASO 1/1</div>
        <button class="top-btn" onclick="changeFrame(1)">▶</button>
        <button class="top-btn btn-add" onclick="addFrame()">+</button>
    </div>

    <div class="control-group">
        <button class="top-btn" style="background:#2ecc71" onclick="previewAnim()">PLAY</button>
        <button class="top-btn" style="background:#e67e22" onclick="exportImg()">PNG</button>
        <button class="top-btn" style="background:#e74c3c" onclick="resetAll()">RESET</button>
    </div>
</div>

<div id="main-container">
    <div id="sidebar">
        <div class="cat-label">Equipos</div>
        <div class="tool-btn" onclick="addObj('p-red')" style="background:#ff4757">1</div>
        <div class="tool-btn" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
        <div class="tool-btn" onclick="addObj('p-yellow')" style="background:#eab000; color:000">1</div>
        <div class="tool-btn" onclick="addObj('p-white')" style="background:#fff; color:000">1</div>
        
        <div class="cat-label">Balón</div>
        <div class="tool-btn" onclick="addObj('ball')">⚽</div>

        <div class="cat-label">Material</div>
        <div class="tool-btn" onclick="addObj('cone')" style="color:#ff9f43">▲</div>
        <div class="tool-btn" onclick="addObj('valla')" style="font-size: 20px;">⊓</div>
        <div class="tool-btn" onclick="addObj('pica')" style="color:#feca57">┃</div>

        <div class="cat-label">Líneas</div>
        <div class="tool-btn" onclick="addObj('l-straight')">⎯</div>
        <div class="tool-btn" onclick="addObj('l-curve')">⤴</div>

        <div class="cat-label">Zonas</div>
        <div class="tool-btn" onclick="addObj('z-line')">⬜</div>
        <div class="tool-btn" onclick="addObj('z-fill')">🟩</div>
    </div>

    <div id="canvas-wrap">
        <canvas id="field"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    let frames = [ [] ];
    let curF = 0;
    let selId = null;
    let isMoving = false;
    let lastDist = 0;

    function resize() {
        const wrap = document.getElementById('canvas-wrap');
        canvas.width = wrap.offsetWidth;
        canvas.height = wrap.offsetHeight;
        render();
    }

    function drawField(c) {
        const w = canvas.width, h = canvas.height;
        c.fillStyle = "#27ae60"; c.fillRect(0,0,w,h);
        c.strokeStyle = "rgba(255,255,255,0.7)"; c.lineWidth = 2;
        const m = 20;
        c.strokeRect(m, m, w-m*2, h-m*2);
        c.beginPath(); c.moveTo(w/2, m); c.lineTo(w/2, h-m); c.stroke();
        c.beginPath(); c.arc(w/2, h/2, h*0.15, 0, Math.PI*2); c.stroke();
        c.strokeRect(m, h/2-h*0.25, h*0.2, h*0.5);
        c.strokeRect(w-m-h*0.2, h/2-h*0.25, h*0.2, h*0.5);
    }

    function render() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        drawField(ctx);
        frames[curF].forEach(el => {
            ctx.save();
            ctx.translate(el.x, el.y);
            ctx.rotate(el.rot || 0);
            const s = el.scale || 1;
            if(el.type.startsWith('p-')) {
                ctx.beginPath(); ctx.arc(0,0,18*s,0,Math.PI*2);
                ctx.fillStyle = el.color; ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth=2; ctx.stroke();
                ctx.fillStyle = (el.type==='p-white'||el.type==='p-yellow')?'#000':'#fff';
                ctx.font=`bold ${12*s}px arial`; ctx.textAlign="center"; ctx.textBaseline="middle";
                ctx.fillText(el.num, 0, 0);
            } else if(el.type === 'ball') {
                ctx.beginPath(); ctx.arc(0,0,8*s,0,Math.PI*2);
                ctx.fillStyle="#fff"; ctx.fill(); ctx.strokeStyle="#000"; ctx.stroke();
            } else if(el.type.startsWith('z-')) {
                ctx.strokeStyle="white"; ctx.lineWidth=2;
                if(el.type==='z-fill'){ctx.fillStyle="rgba(255,255,255,0.15)"; ctx.fillRect(-50*s,-30*s,100*s,60*s);}
                ctx.setLineDash([5,5]); ctx.strokeRect(-50*s,-30*s,100*s,60*s);
            }
            if(selId === el.id) {
                ctx.beginPath(); ctx.arc(0,0,32*s,0,Math.PI*2);
                ctx.strokeStyle="yellow"; ctx.setLineDash([4,4]); ctx.stroke();
            }
            ctx.restore();
        });
    }

    function addObj(type) {
        const colors = {'p-red':'#ff4757', 'p-blue':'#2e86de', 'p-yellow':'#eab000', 'p-white':'#fff'};
        const num = frames[curF].filter(e => e.type === type).length + 1;
        frames[curF].push({ id: Date.now(), type, x: canvas.width/2, y: canvas.height/2, color: colors[type] || '#fff', num, rot:0, scale:1 });
        render();
    }

    function addFrame() {
        frames.push(JSON.parse(JSON.stringify(frames[curF])));
        curF = frames.length - 1;
        updateUI();
    }

    function changeFrame(dir) {
        curF = Math.max(0, Math.min(frames.length - 1, curF + dir));
        updateUI();
    }

    function updateUI() {
        document.getElementById('frame-label').innerText = `PASO ${curF + 1}/${frames.length}`;
        render();
    }

    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const r = canvas.getBoundingClientRect();
        const mx = touch.clientX - r.left, my = touch.clientY - r.top;
        const found = frames[curF].findLast(el => {
            const range = el.type.startsWith('z-') ? 60 : 35;
            return Math.hypot(el.x - mx, el.y - my) < range;
        });
        if(found) { selId = found.id; isMoving = true; } else { selId = null; }
        if(e.touches.length === 2) lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        render();
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if(!isMoving || !selId) return;
        const r = canvas.getBoundingClientRect();
        const el = frames[curF].find(e => e.id === selId);
        if(e.touches.length === 1) {
            el.x = e.touches[0].clientX - r.left; el.y = e.touches[0].clientY - r.top;
        } else if(e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            el.scale *= dist / lastDist; el.scale = Math.max(0.3, Math.min(el.scale, 4));
            lastDist = dist;
        }
        render();
    }, {passive: false});

    function resetAll() { if(confirm("¿Reiniciar pizarra?")) { frames=[[]]; curF=0; updateUI(); } }
    function exportImg() { const link = document.createElement('a'); link.download = 'tactica.png'; link.href = canvas.toDataURL(); link.click(); }
    
    window.addEventListener('resize', resize);
    window.onload = resize;
</script>
</body>
</html>
