<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerBoard Ultra Pro</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --grass: #27ae60; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        #main-ui { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar con Scroll */
        #sidebar { width: 90px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; overflow-x: hidden; padding-bottom: 20px; }
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #3d3d3d; }

        .cat-label { font-size: 9px; text-align: center; padding: 12px 0 5px; color: #84817a; font-weight: bold; text-transform: uppercase; background: #161d23; }
        .tool-btn { width: 55px; height: 55px; margin: 8px auto; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #3d3d3d; background: #2d3436; flex-shrink: 0; position: relative; }
        
        /* Canvas Area */
        #canvas-wrap { flex: 1; background: #1a1a1a; position: relative; display: flex; align-items: center; justify-content: center; }
        canvas { background: var(--grass); box-shadow: 0 0 50px rgba(0,0,0,0.5); touch-action: none; }

        #hud { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
        .hud-btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 11px; }

        /* Timeline */
        #timeline { height: 85px; background: #0f1418; display: flex; align-items: center; padding: 0 15px; gap: 10px; overflow-x: auto; border-top: 2px solid var(--accent); }
        .f-card { min-width: 75px; height: 50px; background: #2d3436; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid transparent; flex-shrink: 0; }
        .f-card.active { border-color: var(--accent); background: #3d3d3d; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="sidebar">
        <div class="cat-label">Equipos</div>
        <div class="tool-btn" onclick="addObj('p-red')" style="background:#ff4757">1</div>
        <div class="tool-btn" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
        <div class="tool-btn" onclick="addObj('p-yellow')" style="background:#eab000; color:000">1</div>
        <div class="tool-btn" onclick="addObj('p-white')" style="background:#fff; color:000">1</div>
        
        <div class="cat-label">Balón</div>
        <div class="tool-btn" onclick="addObj('ball')">⚽</div>

        <div class="cat-label">Material</div>
        <div class="tool-btn" onclick="addObj('cone')">▲</div>
        <div class="tool-btn" onclick="addObj('pica')">┃</div>
        <div class="tool-btn" onclick="addObj('valla')">⊓</div>

        <div class="cat-label">Líneas</div>
        <div class="tool-btn" onclick="addObj('l-straight')">⎯</div>
        <div class="tool-btn" onclick="addObj('l-dash')">---</div>
        <div class="tool-btn" onclick="addObj('l-curve')">⤴</div>

        <div class="cat-label">Zonas</div>
        <div class="tool-btn" onclick="addObj('z-line')">⬜</div>
        <div class="tool-btn" onclick="addObj('z-fill')">🟩</div>
    </div>

    <div id="canvas-wrap">
        <canvas id="field"></canvas>
        <div id="hud">
            <button class="hud-btn" style="background:#2ecc71" onclick="alert('Preview próximamente')">PREVIEW</button>
            <button class="hud-btn" style="background:#e74c3c" onclick="resetAll()">RESET</button>
        </div>
    </div>
</div>

<div id="timeline">
    <div id="frame-list" style="display:flex; gap:10px;"></div>
    <button onclick="addFrame()" style="min-width:40px; height:40px; border-radius:50%; background:var(--accent); border:none; color:white; font-size:20px">+</button>
</div>

<script>
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    let frames = [ [] ];
    let curF = 0;
    let selId = null;
    let isMoving = false;
    let lastDist = 0;

    function init() {
        const w = window.innerWidth - 90;
        const h = window.innerHeight - 85;
        canvas.height = h - 20;
        canvas.width = canvas.height * 1.5;
        if(canvas.width > w) { canvas.width = w - 20; canvas.height = canvas.width / 1.5; }
        updateUI();
        render();
    }

    function drawPitch(c) {
        const w = canvas.width, h = canvas.height, p = 30;
        c.fillStyle = "#27ae60"; c.fillRect(0,0,w,h);
        c.strokeStyle = "rgba(255,255,255,0.8)"; c.lineWidth = 2;
        c.strokeRect(p, p, w-p*2, h-p*2);
        c.beginPath(); c.moveTo(w/2, p); c.lineTo(w/2, h-p); c.stroke();
        c.beginPath(); c.arc(w/2, h/2, h*0.15, 0, Math.PI*2); c.stroke();
        // Áreas
        c.strokeRect(p, h/2-h*0.2, h*0.25, h*0.4);
        c.strokeRect(w-p-h*0.25, h/2-h*0.2, h*0.25, h*0.4);
    }

    function render() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        drawPitch(ctx);
        
        frames[curF].forEach(el => {
            ctx.save();
            ctx.translate(el.x, el.y);
            ctx.rotate(el.rot || 0);
            const s = el.scale || 1;

            if(el.type.startsWith('p-')) {
                ctx.beginPath(); ctx.arc(0,0,18*s,0,Math.PI*2);
                ctx.fillStyle = el.color; ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth=2; ctx.stroke();
                ctx.fillStyle = (el.type==='p-white'||el.type==='p-yellow')?'#000':'#fff';
                ctx.font=`bold ${12*s}px arial`; ctx.textAlign="center"; ctx.textBaseline="middle";
                ctx.fillText(el.num, 0, 0);
            } 
            else if(el.type === 'ball') {
                ctx.beginPath(); ctx.arc(0,0,8*s,0,Math.PI*2);
                ctx.fillStyle="#fff"; ctx.fill(); ctx.strokeStyle="#000"; ctx.stroke();
                // Detalle balón
                for(let i=0; i<5; i++) {
                    ctx.rotate(Math.PI*2/5);
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, 5*s); ctx.stroke();
                }
            }
            else if(el.type === 'cone') {
                ctx.beginPath(); ctx.moveTo(0, -12*s); ctx.lineTo(-10*s, 10*s); ctx.lineTo(10*s, 10*s); ctx.closePath();
                ctx.fillStyle="#ff9f43"; ctx.fill();
            }
            else if(el.type === 'valla') {
                ctx.strokeStyle="#fff"; ctx.lineWidth=3;
                ctx.strokeRect(-15*s, -10*s, 30*s, 20*s);
                ctx.clearRect(-16*s, 5*s, 32*s, 10*s); // Estilo WhatsApp
            }
            else if(el.type === 'pica') {
                ctx.fillStyle="#feca57"; ctx.fillRect(-2*s, -20*s, 4*s, 40*s);
            }
            else if(el.type.startsWith('z-')) {
                ctx.strokeStyle="#fff"; ctx.lineWidth=2;
                if(el.type==='z-fill'){ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.fillRect(-50*s,-30*s,100*s,60*s);}
                ctx.setLineDash([5,5]); ctx.strokeRect(-50*s,-30*s,100*s,60*s);
            }

            if(selId === el.id) {
                ctx.beginPath(); ctx.arc(0,0,30*s,0,Math.PI*2);
                ctx.strokeStyle="yellow"; ctx.setLineDash([4,4]); ctx.stroke();
            }
            ctx.restore();
        });
    }

    function addObj(type) {
        const colors = {'p-red':'#ff4757', 'p-blue':'#2e86de', 'p-yellow':'#eab000', 'p-white':'#fff'};
        const num = frames[curF].filter(e => e.type === type).length + 1;
        frames[curF].push({ id: Date.now(), type, x: 100, y: 100, color: colors[type] || '#fff', num, rot:0, scale:1 });
        render();
    }

    function addFrame() {
        frames.push(JSON.parse(JSON.stringify(frames[curF])));
        curF = frames.length - 1;
        updateUI(); render();
    }

    function updateUI() {
        const list = document.getElementById('frame-list');
        list.innerHTML = "";
        frames.forEach((f, i) => {
            const card = document.createElement('div');
            card.className = `f-card ${i === curF ? 'active' : ''}`;
            card.innerText = `Paso ${i+1}`;
            card.onclick = () => { curF = i; updateUI(); render(); };
            list.appendChild(card);
        });
    }

    canvas.addEventListener('touchstart', (e) => {
        const r = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const mx = touch.clientX - r.left, my = touch.clientY - r.top;

        // Detección mejorada: Margen mayor para zonas (hitbox de 60px)
        const found = frames[curF].findLast(el => {
            const range = el.type.startsWith('z-') ? 60 : 30;
            return Math.hypot(el.x - mx, el.y - my) < range;
        });

        if(found) { selId = found.id; isMoving = true; } else { selId = null; }
        if(e.touches.length === 2) lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        render();
    });

    canvas.addEventListener('touchmove', (e) => {
        const r = canvas.getBoundingClientRect();
        const el = frames[curF].find(e => e.id === selId);
        if(!el) return;
        if(e.touches.length === 1 && isMoving) {
            el.x = e.touches[0].clientX - r.left; el.y = e.touches[0].clientY - r.top;
        } else if(e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            el.scale *= dist / lastDist; el.scale = Math.max(0.3, Math.min(el.scale, 4));
            lastDist = dist;
        }
        render();
    });

    function resetAll() { if(confirm("¿Borrar?")) { frames=[[]]; curF=0; updateUI(); render(); } }
    window.onload = init;
</script>
</body>
</html>
