<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>SoccerBoard Pro</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --grass: #27ae60; --top: #161d23; }
        body { margin: 0; background: #000; color: white; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        @media screen and (orientation: portrait) { #rotate-overlay { display: flex !important; } }
        #rotate-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: var(--panel); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #top-bar { height: 55px; background: var(--top); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; border-bottom: 1px solid #000; z-index: 100; flex-shrink: 0; }
        .control-group { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 6px; }
        .top-btn { padding: 8px 10px; border-radius: 4px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 11px; background: #2d3436; }
        .btn-add { background: var(--accent) !important; font-size: 18px !important; padding: 2px 12px !important; }
        #main-container { display: flex; flex: 1; width: 100%; overflow: hidden; position: relative; }
        #sidebar { width: 75px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; flex-shrink: 0; }
        .cat-label { font-size: 8px; text-align: center; padding: 8px 0 4px; color: #84817a; font-weight: bold; text-transform: uppercase; }
        .tool-btn { width: 48px; height: 48px; margin: 4px auto; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #3d3d3d; background: #2d3436; flex-shrink: 0; }
        #canvas-wrap { flex: 1; background: var(--grass); position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #config-panel { position: absolute; top: 0; right: -280px; width: 260px; height: 100%; background: var(--panel); border-left: 2px solid #000; transition: 0.3s; z-index: 200; padding: 15px; box-sizing: border-box; font-size: 12px; overflow-y: auto; }
        #config-panel.open { right: 0; }
        .config-group { margin-bottom: 15px; border-bottom: 1px solid #3d3d3d; padding-bottom: 10px; }
        .config-group label { display: block; margin-bottom: 5px; color: var(--accent); font-weight: bold; }
        select, input[type="range"], input[type="text"] { width: 100%; background: #2d3436; color: white; border: 1px solid #3d3d3d; padding: 5px; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="rotate-overlay">
        <div style="font-size: 40px;">🔄</div>
        <p>Gira el móvil para usar la pizarra</p>
    </div>
    <div id="top-bar">
        <div class="control-group">
            <button class="top-btn" onclick="changeFrame(-1)">◀</button>
            <div id="frame-label" style="font-size:10px; min-width:50px; text-align:center;">PASO 1/1</div>
            <button class="top-btn" onclick="changeFrame(1)">▶</button>
            <button class="top-btn btn-add" onclick="addFrame()">+</button>
        </div>
        <div class="control-group">
            <button class="top-btn" style="background:#e67e22" onclick="exportImg()">PNG</button>
            <button class="top-btn" onclick="toggleConfig()">⚙️</button>
            <button class="top-btn" style="background:#e74c3c" onclick="resetAll()">RESET</button>
        </div>
    </div>
    <div id="main-container">
        <div id="sidebar">
            <div class="cat-label">Equipos</div>
            <div class="tool-btn" onclick="addObj('p-red')" style="background:#ff4757">1</div>
            <div class="tool-btn" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
            <div class="tool-btn" onclick="addObj('p-yellow')" style="background:#eab000; color:000">1</div>
            <div class="tool-btn" onclick="addObj('p-white')" style="background:#fff; color:000">1</div>
            <div class="cat-label">Material</div>
            <div class="tool-btn" onclick="addObj('ball')">⚽</div>
            <div class="tool-btn" onclick="addObj('cone')" style="color:#ff9f43">▲</div>
            <div class="cat-label">Zonas</div>
            <div class="tool-btn" onclick="addObj('z-fill')">🟩</div>
        </div>
        <div id="canvas-wrap"><canvas id="field"></canvas></div>
        <div id="config-panel">
            <h3>Ajustes</h3>
            <div class="config-group"><label>Tamaño Jugadores</label><input type="range" id="playerSize" min="0.5" max="2.0" step="0.1" value="1" oninput="render()"></div>
            <div class="config-group"><label>Vista</label><select id="viewSelect" onchange="render()"><option value="full">Campo Entero</option><option value="half">Medio Campo</option><option value="green">Fondo Verde</option></select></div>
            <div class="config-group"><label>Idioma</label><select onchange="setLang(this.value)"><option value="es">Español</option><option value="en">English</option></select></div>
            <button class="top-btn" style="width:100%" onclick="toggleConfig()">Cerrar</button>
        </div>
    </div>
    <script>
        // [Aquí va el código JavaScript anterior que ya optimizamos]
        // Se incluye el Service Worker para modo Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
