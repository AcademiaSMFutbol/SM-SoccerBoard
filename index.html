<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizarra Táctica Visual Pro</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --grass: #27ae60; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Layout */
        #ui-layer { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 85px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; }
        #canvas-wrap { flex: 1; background: #16a085; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* Categorías y Botones */
        .cat-label { font-size: 0.6em; text-align: center; padding: 10px 0 5px; color: #84817a; font-weight: bold; border-top: 1px solid #2d3436; }
        .tool-btn { width: 55px; height: 55px; margin: 5px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #3d3d3d; position: relative; background: #2d3436; }
        
        /* Timeline */
        #timeline { height: 100px; background: #0f1418; display: flex; align-items: center; padding: 0 15px; gap: 12px; overflow-x: auto; border-top: 3px solid var(--accent); }
        .f-card { min-width: 90px; height: 65px; background: #2d3436; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; border: 2px solid transparent; flex-direction: column; }
        .f-card.active { border-color: var(--accent); background: #3d3d3d; }
        
        #controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .main-btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; }
        
        canvas { background: var(--grass); cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="sidebar">
        <div class="cat-label">EQUIPOS</div>
        <div class="tool-btn" onclick="addObj('p-red')" style="background:#ff4757">1</div>
        <div class="tool-btn" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
        <div class="tool-btn" onclick="addObj('p-yellow')" style="background:#eab000; color:black">1</div>
        <div class="tool-btn" onclick="addObj('p-white')" style="background:#ffffff; color:black">1</div>
        
        <div class="cat-label">MATERIAL</div>
        <div class="tool-btn" onclick="addObj('ball')">⚽</div>
        <div class="tool-btn" onclick="addObj('goal-mini')">🥅</div>
        
        <div class="cat-label">ZONAS</div>
        <div class="tool-btn" onclick="addObj('zone-line')">🔲</div>
        <div class="tool-btn" onclick="addObj('zone-fill')">🟩</div>
    </div>

    <div id="canvas-wrap">
        <canvas id="field"></canvas>
        <div id="controls">
            <button class="main-btn" style="background:#27ae60" onclick="openPreview()">PREVIEW</button>
            <button class="main-btn" style="background:#c0392b" onclick="clearAll()">RESET</button>
        </div>
    </div>
</div>

<div id="timeline">
    <div id="frame-list" style="display:flex; gap:10px;"></div>
    <button onclick="addFrame()" style="width:50px; height:50px; border-radius:50%; background:var(--accent); border:none; color:white; font-size:1.8em">+</button>
</div>

<script>
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    let frames = [ [] ];
    let curF = 0;
    let selId = null;

    function init() {
        canvas.width = window.innerWidth - 85;
        canvas.height = window.innerHeight - 100;
        updateUI();
        render();
    }

    // --- MOTOR GRÁFICO: DIBUJO DEL CAMPO ---
    function drawPitch(tCtx) {
        const w = tCtx.canvas.width;
        const h = tCtx.canvas.height;
        const pad = 40;
        
        tCtx.fillStyle = "#27ae60";
        tCtx.fillRect(0, 0, w, h);
        
        tCtx.strokeStyle = "rgba(255,255,255,0.9)";
        tCtx.lineWidth = 2;

        // Líneas exteriores
        tCtx.strokeRect(pad, pad, w - pad*2, h - pad*2);
        
        // Medio campo
        tCtx.beginPath();
        tCtx.moveTo(w/2, pad); tCtx.lineTo(w/2, h - pad);
        tCtx.stroke();
        
        // Círculo Central y punto
        tCtx.beginPath(); tCtx.arc(w/2, h/2, 60, 0, Math.PI*2); tCtx.stroke();
        tCtx.beginPath(); tCtx.arc(w/2, h/2, 2, 0, Math.PI*2); tCtx.fill();

        // Áreas (Izquierda)
        tCtx.strokeRect(pad, h/2 - 120, 100, 240); // Grande
        tCtx.strokeRect(pad, h/2 - 50, 40, 100);   // Pequeña
        tCtx.beginPath(); tCtx.arc(pad + 80, h/2, 2, 0, Math.PI*2); tCtx.fill(); // Penalti
        tCtx.beginPath(); tCtx.arc(pad + 100, h/2, 50, -Math.PI/2.5, Math.PI/2.5); tCtx.stroke(); // Media luna

        // Áreas (Derecha)
        tCtx.strokeRect(w - pad - 100, h/2 - 120, 100, 240);
        tCtx.strokeRect(w - pad - 40, h/2 - 50, 40, 100);
        tCtx.beginPath(); tCtx.arc(w - pad - 80, h/2, 2, 0, Math.PI*2); tCtx.fill();
        tCtx.beginPath(); tCtx.arc(w - pad - 100, h/2, 50, Math.PI - Math.PI/2.5, Math.PI + Math.PI/2.5); tCtx.stroke();
    }

    // --- MOTOR GRÁFICO: DIBUJO DE OBJETOS ---
    function render() {
        drawPitch(ctx);
        const elements = frames[curF];
        
        elements.forEach(el => {
            ctx.save();
            ctx.translate(el.x, el.y);
            ctx.rotate(el.angle || 0);

            if(el.type.startsWith('p-')) drawPlayer(el);
            else if(el.type === 'ball') drawBall();
            else if(el.type === 'goal-mini') drawMiniGoal();
            else if(el.type.startsWith('zone')) drawZone(el);

            if(selId === el.id) {
                ctx.beginPath(); ctx.arc(0,0, 25, 0, Math.PI*2);
                ctx.strokeStyle = "yellow"; ctx.setLineDash([4,4]); ctx.stroke();
            }
            ctx.restore();
        });
    }

    function drawPlayer(el) {
        const colors = {
            'p-red': ['#ff4757', '#c0392b'],
            'p-blue': ['#2e86de', '#1d63a3'],
            'p-yellow': ['#eab000', '#b88a00'],
            'p-white': ['#ffffff', '#bdc3c7']
        };
        const [main, dark] = colors[el.type];
        
        // Cuerpo
        ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2);
        const grad = ctx.createRadialGradient(-5, -5, 2, 0, 0, 18);
        grad.addColorStop(0, main); grad.addColorStop(1, dark);
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.stroke();
        
        // Número
        ctx.fillStyle = (el.type === 'p-white' || el.type === 'p-yellow') ? "black" : "white";
        ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(el.num, 0, 0);
    }

    function drawBall() {
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2);
        ctx.fillStyle = "white"; ctx.fill();
        ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();
        // Pentágonos sutiles
        ctx.beginPath(); ctx.moveTo(-4,0); ctx.lineTo(4,0); ctx.stroke();
    }

    function drawMiniGoal() {
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-20, 15); ctx.lineTo(-20, -15); // Lado izq
        ctx.lineTo(20, -15); // Travesaño
        ctx.lineTo(20, 15);  // Lado der
        ctx.stroke();
    }

    function drawZone(el) {
        ctx.lineWidth = 2; ctx.strokeStyle = "white";
        if(el.type === 'zone-fill') {
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(-50, -35, 100, 70);
        }
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(-50, -35, 100, 70);
    }

    // --- LÓGICA DE APLICACIÓN ---
    function addObj(type) {
        // Contar cuántos jugadores hay de ese equipo para el número del dorsal
        const num = frames[curF].filter(e => e.type === type).length + 1;
        frames[curF].push({ id: Date.now(), type, x: 150, y: 150, num, angle: 0 });
        render();
    }

    function addFrame() {
        frames.push(JSON.parse(JSON.stringify(frames[curF])));
        curF = frames.length - 1;
        updateUI();
        render();
    }

    function updateUI() {
        const list = document.getElementById('frame-list');
        list.innerHTML = "";
        frames.forEach((f, i) => {
            const card = document.createElement('div');
            card.className = `f-card ${i === curF ? 'active' : ''}`;
            card.innerHTML = `<b>PASO ${i+1}</b>`;
            card.onclick = () => { curF = i; updateUI(); render(); };
            list.appendChild(card);
        });
    }

    // --- INTERACCIÓN TÁCTIL ---
    let isMoving = false;
    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        const r = canvas.getBoundingClientRect();
        const mx = t.clientX - r.left; const my = t.clientY - r.top;
        
        const found = frames[curF].findLast(el => Math.hypot(el.x - mx, el.y - my) < 30);
        if(found) { selId = found.id; isMoving = true; }
        else { selId = null; }
        render();
    });

    canvas.addEventListener('touchmove', (e) => {
        if(!isMoving || !selId) return;
        const t = e.touches[0];
        const r = canvas.getBoundingClientRect();
        const el = frames[curF].find(e => e.id === selId);
        el.x = t.clientX - r.left; el.y = t.clientY - r.top;
        render();
    });

    canvas.addEventListener('touchend', () => isMoving = false);

    function clearAll() { if(confirm("¿Borrar todo?")) { frames = [[]]; curF = 0; updateUI(); render(); } }

    window.onload = init;
</script>
</body>
</html>
