<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v61</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app-root">
        <header id="top-bar">
            <div class="top-section">
                <button class="btn btn-nav" onclick="navStep(-1)">◀</button>
                <span id="step-label">1/1</span>
                <button class="btn btn-nav" onclick="navStep(1)">▶</button>
                <button class="btn btn-accent" onclick="addStep()">+ PASO</button>
            </div>
            <div class="top-section">
                <button class="btn btn-util" onclick="openLibrary()">📚 BIBLIOTECA</button>
                <button class="btn btn-util" onclick="undo()">⟲ DESHACER</button>
            </div>
            <div class="top-section">
                <button class="btn btn-play" onclick="runAnimation()">▶ PLAY</button>
                <button class="btn" onclick="exportStepPNG()">💾 PNG</button>
                <button class="btn btn-save" onclick="exportMP4()">🎬 MP4</button>
                <button class="btn btn-danger" onclick="openResetMenu()">🗑️</button>
            </div>
        </header>

        <main id="main-layout">
            <aside id="sidebar-left">
                <p class="cat">TRAZOS</p>
                <div class="tool" onclick="createVector('line')">⎯</div>
                <div class="tool" onclick="createVector('curve')">⤴</div>
                
                <p class="cat">EQUIPOS</p>
                <div class="tool t-red" onclick="createPlayer('p-red')">1</div>
                <div class="tool t-blue" onclick="createPlayer('p-blue')">1</div>
                <div class="tool t-yellow" onclick="createPlayer('p-yellow')">1</div>
                <div class="tool t-green" onclick="createPlayer('p-green')">1</div>
                
                <p class="cat">ZONAS</p>
                <div class="tool" onclick="createZone('fill')">🟩</div>
                <div class="tool" onclick="createZone('line')">⬜</div>
                
                <p class="cat">MATERIAL</p>
                <div class="tool" onclick="createItem('ball')">⚽</div>
                <div class="tool" onclick="createItem('cone')">▲</div>
                <div class="tool" onclick="createItem('ladder')">🪜</div>
            </aside>

            <section id="viewport" onpointerdown="handlePointerDown(event)" onpointermove="handlePointerMove(event)" onpointerup="handlePointerEnd()">
                <div id="field-master">
                    <svg id="svg-layer">
                        <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" /></marker></defs>
                    </svg>
                </div>
            </section>

            <aside id="sidebar-right">
                <div id="inspector-panel" style="display:none">
                    <p class="cat">EDITOR</p>
                    <div class="row"><span>COLOR</span><input type="color" id="ins-color" oninput="modifyProp('color', this.value)"></div>
                    <button class="btn btn-accent w-100" onclick="duplicateActive()">➕ DUPLICAR</button>
                    <button class="btn w-100" onclick="deselect()">LISTO</button>
                    <hr>
                </div>
                <p class="cat">COLORES EQUIPOS</p>
                <div class="team-grid">
                    <input type="color" value="#ff4757" oninput="updateTeamColor('p-red', this.value)">
                    <input type="color" value="#2e86de" oninput="updateTeamColor('p-blue', this.value)">
                    <input type="color" value="#f1c40f" oninput="updateTeamColor('p-yellow', this.value)">
                    <input type="color" value="#2ecc71" oninput="updateTeamColor('p-green', this.value)">
                </div>
                <p class="cat">FONDO</p>
                <select class="custom-select" onchange="changeField(this.value)">
                    <option value="entero">Completo</option>
                    <option value="medio">Medio Campo</option>
                </select>
            </aside>
        </main>

        <div id="library-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>BIBLIOTECA</h3>
                <div class="grid-modal">
                    <button class="btn-item" onclick="injectDrill('rondo42')">Rondo 4x2</button>
                    <button class="btn-item" onclick="injectDrill('y_drill')">Ejercicio en Y (Full)</button>
                    <button class="btn-item" onclick="injectDrill('slalom')">Slalom Regate</button>
                </div>
                <button class="btn btn-danger w-100" onclick="closeLibrary()">CERRAR</button>
            </div>
        </div>

        <div id="reset-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>¿Borrar contenido?</h3>
                <button class="btn btn-dark w-100" onclick="resetAction('step')">BORRAR PASO ACTUAL</button>
                <button class="btn btn-danger w-100" onclick="resetAction('project')">BORRAR TODO</button>
                <button class="btn w-100" onclick="closeResetMenu()">CANCELAR</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
