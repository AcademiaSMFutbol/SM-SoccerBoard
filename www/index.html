<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v30</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#12171b">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app-root">
        <div id="top-bar">
            <div class="btn-group">
                <button class="btn" onclick="toggleFullScreen()" title="Pantalla Completa">⛶</button>
                <button class="btn" onclick="undo()" id="undoBtn" title="Deshacer">⟲</button>
                <button class="btn btn-danger" onclick="clearField()" title="Limpiar Paso">✨</button>
                <div class="divider"></div>
                <button class="btn" onclick="navStep(-1)">◀</button>
                <span id="step-label">1/1</span>
                <button class="btn" onclick="navStep(1)">▶</button>
                <button class="btn btn-accent" onclick="addStep()">+ PASO</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-play" onclick="runAnimation()">▶ PLAY</button>
                <button class="btn btn-save" onclick="exportStepPNG()">💾 PNG</button>
                <button class="btn btn-danger" onclick="removeActive()">🗑️</button>
            </div>
        </div>

        <div id="top-inspector">
            <div class="ins-section">
                <label>COLOR</label>
                <input type="color" id="ins-color" oninput="modifyProp('color', this.value)">
            </div>

            <div class="ins-section">
                <label>VELOCIDAD ANIM.</label>
                <input type="range" min="200" max="2000" step="100" value="800" id="ins-speed" oninput="updateSpeed(this.value)">
            </div>

            <button class="btn btn-accent" onclick="duplicateActive()">➕ DUPLICAR</button>

            <div id="ins-vec-extras">
                <div class="divider"></div>
                <select id="ins-line-type" onchange="modifyProp('lineType', this.value)">
                    <option value="solid">Continua (Balón)</option>
                    <option value="dashed">Moteada (Jugador)</option>
                </select>
                <label>FLECHA <input type="checkbox" id="ins-arrow" onchange="modifyProp('arrow', this.checked)"></label>
            </div>
            
            <button class="btn btn-dark" onclick="deselect()">OK</button>
        </div>

        <div id="main-area">
            <div id="sidebar">
                <div class="cat-label">Dibujo</div>
                <div class="tool" onclick="createVector('line')">⎯</div>
                <div class="tool" onclick="createVector('curve')">⤴</div>
                <div class="cat-label">Equipos</div>
                <div class="tool" onclick="createPlayer('p-red')" style="background:#ff4757">1</div>
                <div class="tool" onclick="createPlayer('p-blue')" style="background:#2e86de">1</div>
                <div class="tool" onclick="createPlayer('p-yellow')" style="background:#f1c40f; color:0">1</div>
                <div class="tool" onclick="createPlayer('p-green')" style="background:#2ecc71">1</div>
                <div class="cat-label">Zonas</div>
                <div class="tool" onclick="createZone('fill')">🟩</div>
                <div class="tool" onclick="createZone('line')">⬜</div>
                <div class="cat-label">Material</div>
                <div class="tool" onclick="createItem('ball')">⚽</div>
                <div class="tool" onclick="createItem('cone')">▲</div>
                <div class="tool" onclick="createItem('pica')">┃</div>
                <div class="tool" onclick="createItem('valla')">⊓</div>
                <div class="tool" onclick="createItem('ladder')">🪜</div>
            </div>

            <div id="viewport" onpointerdown="handleGlobalDown(event)" onpointermove="handleGlobalMove(event)" onpointerup="handleGlobalEnd()">
                <div id="field-master">
                    <svg id="svg-layer">
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" />
                            </marker>
                        </defs>
                    </svg>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
