<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v8 - Precision Vector</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --top: #161d23; --grass: #27ae60; --danger: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }

        #top-bar { height: 50px; background: var(--top); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 100; border-bottom: 1px solid #000; }
        #main { display: flex; height: calc(100% - 50px); width: 100%; }
        
        #sidebar { width: 75px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; z-index: 10; flex-shrink: 0; }
        .tool { width: 45px; height: 45px; margin: 6px auto; border-radius: 8px; border: 1px solid #3d3d3d; background: #2d3436; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        .cat-label { font-size: 8px; color: #84817a; text-align: center; padding: 10px 0 2px; text-transform: uppercase; font-weight: bold; }

        #field-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; background: #111; padding: 10px; position: relative; }
        #field-canvas { 
            position: relative; width: 100%; height: 100%; max-width: 1000px; max-height: 700px;
            background: var(--grass) url('campoentero.png') no-repeat center / contain;
            box-shadow: 0 0 40px rgba(0,0,0,0.6); overflow: hidden; 
        }

        .object { position: absolute; z-index: 20; display: flex; align-items: center; justify-content: center; user-select: none; pointer-events: auto; transform: translate(-50%, -50%); }
        .player { width: 38px; height: 38px; border-radius: 50%; border: 2px solid white; font-weight: bold; font-size: 13px; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .player::after { content: ''; position: absolute; top: -10px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 8px solid white; }
        .selected { outline: 2px dashed yellow; outline-offset: 5px; z-index: 50 !important; }

        /* Materiales */
        .cone { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid #e67e22; }
        .valla { width: 40px; height: 20px; border: 3px solid white; border-bottom: none; border-radius: 4px 4px 0 0; }
        .goal { width: 45px; height: 25px; border: 2px solid white; background: rgba(255,255,255,0.1); }
        .ladder { width: 100px; height: 35px; border: 2px solid white; background: repeating-linear-gradient(90deg, transparent, transparent 18px, white 18px, white 20px); }

        /* Zonas */
        .zone { position: absolute; transform: translate(0,0); z-index: 15; }
        .zone-shade { background: rgba(255, 165, 0, 0.4); border: 2px solid orange; }
        .zone-outline { border: 2px dashed yellow; background: transparent; }

        /* Vectores */
        .node { position: absolute; width: 30px; height: 30px; z-index: 100; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }
        .node-inner { width: 12px; height: 12px; background: white; border: 2px solid var(--accent); border-radius: 50%; box-shadow: 0 0 5px black; }
        .line-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        .hitbox { pointer-events: stroke; stroke: transparent; stroke-width: 30; fill: none; cursor: pointer; }

        #config-panel { position: absolute; top: 0; right: -280px; width: 260px; height: 100%; background: var(--panel); border-left: 2px solid #000; transition: 0.3s; z-index: 500; padding: 20px; color: white; }
        #config-panel.open { right: 0; }
        .btn { background: #2d3436; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="display: flex; gap: 6px; align-items: center;">
        <button class="btn" onclick="changeFrame(-1)">◀</button>
        <b id="frame-info" style="color:white; font-size:12px; min-width:35px; text-align:center;">1/1</b>
        <button class="btn" onclick="changeFrame(1)">▶</button>
        <button class="btn" style="background:var(--accent)" onclick="addFrame()">+ PASO</button>
        <button class="btn" style="background:var(--danger)" onclick="deleteSelected()">🗑️</button>
    </div>
    <div style="display: flex; gap: 6px;">
        <button class="btn" style="background:#2ecc71" onclick="playAnim()">▶ PLAY</button>
        <button class="btn" onclick="toggleConfig()">⚙️</button>
    </div>
</div>

<div id="main">
    <div id="sidebar">
        <div class="cat-label">Vectores</div>
        <div class="tool" onclick="addVec('line')">⎯</div>
        <div class="tool" onclick="addVec('curve')">⤴</div>
        <div class="cat-label">Equipos</div>
        <div class="tool" onclick="addObj('p-red')" style="background:#ff4757">1</div>
        <div class="tool" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
        <div class="tool" onclick="addObj('p-yellow')" style="background:#f1c40f; color:0">1</div>
        <div class="tool" onclick="addObj('p-green')" style="background:#2ecc71">1</div>
        <div class="cat-label">Material</div>
        <div class="tool" onclick="addObj('ball')">⚽</div>
        <div class="tool" onclick="addObj('cone')">▲</div>
        <div class="tool" onclick="addObj('valla')">⊓</div>
        <div class="tool" onclick="addObj('goal')">🥅</div>
        <div class="tool" onclick="addObj('ladder')">🪜</div>
        <div class="cat-label">Zonas</div>
        <div class="tool" onclick="addZone('shade')">🟧</div>
        <div class="tool" onclick="addZone('outline')">🟨</div>
    </div>
    
    <div id="field-wrapper" onclick="deselectAll()">
        <div id="field-canvas">
            <svg class="line-svg" id="svg-layer">
                <defs>
                    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="white" />
                    </marker>
                </defs>
            </svg>
        </div>
    </div>

    <div id="config-panel" onclick="event.stopPropagation()">
        <h3>Ajustes</h3>
        <label style="font-size:10px; color:var(--accent)">MODO ORIENTACIÓN</label>
        <select id="orient" style="width:100%; background:#2d3436; color:white; padding:8px; margin:10px 0;">
            <option value="landscape">Horizontal</option>
            <option value="portrait">Vertical</option>
        </select>
        <hr>
        <label style="font-size:10px; color:var(--accent)">ESCALA JUGADORES</label>
        <input type="range" id="pScale" min="0.5" max="2.2" step="0.1" value="1.0" oninput="render()">
        <button class="btn" style="width:100%; margin-top:20px; background:var(--danger)" onclick="toggleConfig()">CERRAR</button>
    </div>
</div>

<script>
    let frames = [ [] ];
    let curF = 0;
    let selId = null;
    let isPlaying = false;

    const canvas = document.getElementById('field-canvas');
    const svg = document.getElementById('svg-layer');

    function render() {
        if(isPlaying) return;
        Array.from(canvas.children).forEach(c => { if(c.id !== 'svg-layer') c.remove(); });
        svg.querySelectorAll('.v-el').forEach(e => e.remove());
        const scale = document.getElementById('pScale').value;

        frames[curF].forEach(el => {
            if(el.type === 'vec') drawVector(el);
            else if(el.type === 'zone') drawZone(el);
            else drawPhysical(el, scale);
        });
        document.getElementById('frame-info').innerText = `${curF+1}/${frames.length}`;
    }

    function addObj(type) {
        const id = Date.now();
        const obj = { id, type, x: 150, y: 150, rot: 0, scale: 1, num: frames[curF].filter(o=>o.type===type).length+1 };
        frames[curF].push(obj); selId = id; render();
    }

    function addVec(sub) {
        const id = Date.now();
        // APARECER EN ESQUINA SUPERIOR IZQUIERDA (x:40, y:40)
        const vec = { id, type: 'vec', sub, x1:40, y1:40, x2:140, y2:40, cx1:70, cy1:100, cx2:110, cy2:100 };
        frames[curF].push(vec); selId = id; render();
    }

    function addZone(sub) {
        const id = Date.now();
        frames[curF].push({ id, type: 'zone', sub, x:40, y:40, w:100, h:80 });
        selId = id; render();
    }

    function drawPhysical(el, pScale) {
        const div = document.createElement('div');
        div.className = `object ${el.type} ${selId === el.id ? 'selected' : ''}`;
        const s = el.type.startsWith('p-') ? pScale : el.scale;

        if(el.type.startsWith('p-')) {
            const colors = {'p-red':'#ff4757', 'p-blue':'#2e86de', 'p-yellow':'#f1c40f', 'p-green':'#2ecc71'};
            div.classList.add('player'); div.style.background = colors[el.type]; div.innerText = el.num;
        } else if(el.type === 'ball') div.innerText = '⚽';
        else div.classList.add(el.type);

        div.style.left = el.x + 'px'; div.style.top = el.y + 'px';
        div.style.transform = `translate(-50%, -50%) rotate(${el.rot}deg) scale(${s})`;
        div.onpointerdown = (e) => startAction(e, el, 'center');
        canvas.appendChild(div);
    }

    function drawZone(el) {
        const div = document.createElement('div');
        div.className = `zone ${el.sub==='shade'?'zone-shade':'zone-outline'} ${selId === el.id ? 'selected' : ''}`;
        div.style.left = el.x + 'px'; div.style.top = el.y + 'px';
        div.style.width = el.w + 'px'; div.style.height = el.h + 'px';
        div.onpointerdown = (e) => startAction(e, el, 'center');
        canvas.appendChild(div);
        if(selId === el.id) createNode(el, 'w', 'h', el.x + el.w, el.y + el.h, false, true);
    }

    function drawVector(el) {
        const d = el.sub==='curve' ? `M ${el.x1} ${el.y1} C ${el.cx1} ${el.cy1}, ${el.cx2} ${el.cy2}, ${el.x2} ${el.y2}` : `M ${el.x1} ${el.y1} L ${el.x2} ${el.y2}`;
        const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
        hit.setAttribute("d", d); hit.setAttribute("class", "hitbox v-el");
        hit.onpointerdown = (e) => { e.stopPropagation(); selId = el.id; render(); };
        svg.appendChild(hit);

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d); path.setAttribute("class", "v-el");
        path.setAttribute("stroke", selId === el.id ? "yellow" : "white");
        path.setAttribute("stroke-width", "3"); path.setAttribute("fill", "none");
        path.setAttribute("marker-end", "url(#arrow)");
        svg.appendChild(path);

        if(selId === el.id) {
            [['x1','y1'], ['x2','y2']].forEach(([nx, ny]) => createNode(el, nx, ny, el[nx], el[ny]));
            if(el.sub==='curve') [['cx1','cy1'], ['cx2','cy2']].forEach(([nx, ny]) => createNode(el, nx, ny, el[nx], el[ny], true));
        }
    }

    function createNode(el, nx, ny, fx, fy, isC=false, isZone=false) {
        const node = document.createElement('div');
        node.className = 'node';
        node.style.left = fx + 'px'; node.style.top = fy + 'px';
        node.innerHTML = `<div class="node-inner" style="${isC?'background:cyan':''}"></div>`;
        node.onpointerdown = (e) => startAction(e, el, nx, ny, isZone);
        canvas.appendChild(node);
    }

    function startAction(e, el, nx, ny, isZone=false) {
        e.preventDefault(); e.stopPropagation();
        selId = el.id;
        const startX = e.clientX, startY = e.clientY;
        const initX = ny ? el[nx] : el.x, initY = ny ? el[ny] : el.y;
        const initW = el.w, initH = el.h;
        let moved = false;

        window.onpointermove = (ev) => {
            const dx = ev.clientX - startX, dy = ev.clientY - startY;
            if(Math.hypot(dx, dy) > 5) moved = true;
            if(isZone) { el.w = initW + dx; el.h = initH + dy; }
            else if(ny) { el[nx] = initX + dx; el[ny] = initY + dy; }
            else { el.x = initX + dx; el.y = initY + dy; }
            render();
        };

        window.onpointerup = () => {
            if(!moved && nx === 'center' && el.type !== 'zone') { el.rot = (el.rot+45)%360; render(); }
            window.onpointermove = null; window.onpointerup = null;
        };
    }

    async function playAnim() {
        if(frames.length < 2) return;
        isPlaying = true; selId = null;
        for(let i=0; i < frames.length-1; i++) {
            await new Promise(res => {
                let s = null; const f1 = frames[i], f2 = frames[i+1];
                function step(ts) {
                    if(!s) s = ts; const p = Math.min((ts-s)/800, 1);
                    Array.from(canvas.children).forEach(c => { if(c.id !== 'svg-layer') c.remove(); });
                    f1.forEach(o => {
                        const t = f2.find(x => x.id === o.id);
                        if(!t || o.type === 'vec' || o.type === 'zone') return;
                        const x = o.x+(t.x-o.x)*p, y = o.y+(t.y-o.y)*p;
                        const div = document.createElement('div'); div.className = `object ${o.type}`;
                        div.style.left = x+'px'; div.style.top = y+'px';
                        div.style.transform = `translate(-50%,-50%) rotate(${o.rot}deg) scale(${document.getElementById('pScale').value})`;
                        canvas.appendChild(div);
                    });
                    if(p < 1) requestAnimationFrame(step); else res();
                }
                requestAnimationFrame(step);
            });
        }
        isPlaying = false; render();
    }

    function addFrame() { frames.push(JSON.parse(JSON.stringify(frames[curF]))); curF++; render(); }
    function changeFrame(d) { curF = Math.max(0, Math.min(frames.length-1, curF+d)); render(); }
    function deleteSelected() { frames[curF] = frames[curF].filter(o => o.id !== selId); selId = null; render(); }
    function toggleConfig() { document.getElementById('config-panel').classList.toggle('open'); }
    function deselectAll() { selId = null; render(); }
    window.onload = render;
</script>
</body>
</html>
