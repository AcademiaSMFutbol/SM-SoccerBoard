<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v24 - Auditoría Senior</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --top: #12171b; --grass: #27ae60; --danger: #e74c3c; --edit: #f39c12; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

        #app-root { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        
        #top-bar { height: 50px; background: var(--top); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 2000; border-bottom: 1px solid #333; flex-shrink: 0; }
        
        /* INSPECTOR FLOTANTE (Overlay) */
        #top-inspector { 
            position: absolute; top: 50px; left: 0; width: 100%; height: 48px; 
            background: rgba(18, 23, 27, 0.95); display: none; 
            align-items: center; justify-content: center; gap: 12px; 
            border-bottom: 2px solid var(--edit); z-index: 1500; backdrop-filter: blur(10px);
        }

        #main-area { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 65px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; z-index: 100; scrollbar-width: none; }
        
        .tool { width: 42px; height: 42px; margin: 6px auto; border-radius: 10px; border: 1px solid #3d3d3d; background: #2d3436; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        .cat-label { font-size: 7px; color: #84817a; text-align: center; padding: 10px 0 2px; text-transform: uppercase; font-weight: 800; }

        /* VIEWPORT QUE ASEGURA CAMPO COMPLETO */
        #viewport { flex: 1; background: #0a0a0a; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; touch-action: none; padding: 10px; }
        
        #field-master { 
            position: relative; 
            width: 100%; height: 100%;
            max-width: 1100px; max-height: 700px;
            background: var(--grass) url('campoentero.png') no-repeat center / contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden;
            aspect-ratio: 1050 / 680;
        }

        .object { position: absolute; z-index: 100; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .player { width: 38px; height: 38px; border-radius: 50%; border: 2.5px solid white; font-weight: bold; font-size: 14px; color: white; }
        .player::after { content: ''; position: absolute; top: -11px; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 9px solid white; }
        .selected { outline: 3px solid yellow; outline-offset: 5px; z-index: 1000 !important; }

        .cone { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 24px solid; }
        .valla { width: 44px; height: 20px; border: 4px solid; border-bottom: none !important; border-radius: 5px 5px 0 0; }
        .ladder { width: 120px; height: 35px; border: 2px solid; background: repeating-linear-gradient(90deg, transparent, transparent 18px, currentColor 18px, currentColor 20px); }

        .zone { position: absolute; z-index: 10; transform: translate(0,0); border-width: 3px; }
        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .vec-hit { pointer-events: stroke; stroke: transparent; stroke-width: 35; fill: none; }
        
        .node { position: absolute; width: 40px; height: 40px; z-index: 1100; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }
        .node-in { width: 14px; height: 14px; background: white; border: 2px solid var(--accent); border-radius: 50%; box-shadow: 0 0 5px black; }

        .btn { background: #2d3436; color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div id="app-root">
    <div id="top-bar">
        <div style="display: flex; gap: 6px; align-items: center;">
            <button class="btn" onclick="navStep(-1)">◀</button>
            <span id="step-label" style="font-weight: 800; min-width: 35px; text-align: center; color: var(--accent);">1/1</span>
            <button class="btn" onclick="navStep(1)">▶</button>
            <button class="btn" style="background:var(--accent)" onclick="addStep()">+ PASO</button>
        </div>
        <div style="display: flex; gap: 6px;">
            <button class="btn" style="background:#2ecc71" onclick="runAnimation()">▶ PLAY</button>
            <button class="btn" onclick="exportStepPNG()" style="background:#e67e22">💾 PNG</button>
            <button class="btn" style="background:var(--danger)" onclick="removeActive()">🗑️</button>
        </div>
    </div>

    <div id="top-inspector">
        <input type="color" id="ins-color" oninput="modifyProp('color', this.value)" style="width:40px; height:30px; border:none; background:none;">
        <button class="btn" style="background:var(--accent); font-size:16px; padding:4px 12px;" onclick="duplicateActive()">➕</button>
        <div id="ins-vec-extras" style="display:none; align-items:center; gap:10px;">
            <input type="range" min="1" max="12" value="3" oninput="modifyProp('weight', this.value)">
            <label style="color:white; font-size:10px;">FLECHA <input type="checkbox" id="ins-arrow" onchange="modifyProp('arrow', this.checked)"></label>
        </div>
        <button class="btn" style="background:#444;" onclick="deselect()">OK</button>
    </div>

    <div id="main-area">
        <div id="sidebar">
            <div class="cat-label">Dibujo</div>
            <div class="tool" onclick="createVector('line')">⎯</div>
            <div class="tool" onclick="createVector('curve')">⤴</div>
            <div class="cat-label">Equipos</div>
            <div class="tool" onclick="createPlayer('p-red')" style="background:#ff4757">1</div>
            <div class="tool" onclick="createPlayer('p-blue')" style="background:#2e86de">1</div>
            <div class="tool" onclick="createPlayer('p-yellow')" style="background:#f1c40f; color:0">1</div>
            <div class="tool" onclick="createPlayer('p-green')" style="background:#2ecc71">1</div>
            <div class="cat-label">Zonas</div>
            <div class="tool" onclick="createZone('fill')">🟩</div>
            <div class="tool" onclick="createZone('line')">⬜</div>
            <div class="cat-label">Material</div>
            <div class="tool" onclick="createItem('ball')">⚽</div>
            <div class="tool" onclick="createItem('cone')">▲</div>
            <div class="tool" onclick="createItem('valla')">⊓</div>
            <div class="tool" onclick="createItem('ladder')">🪜</div>
        </div>

        <div id="viewport" onpointerdown="handleViewportDown(event)" onpointermove="handleViewportMove(event)" onpointerup="handleViewportEnd()">
            <div id="field-master">
                <svg id="svg-layer">
                    <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" /></marker></defs>
                </svg>
            </div>
        </div>
    </div>
</div>

<script>
    let steps = [ [] ];
    let curStep = 0;
    let activeId = null;
    let dragInfo = null;
    let pinchDist = 0;
    
    // ADN de Objetos (Herencia de propiedades)
    let dna = {
        player: { rot: 0, scale: 1 },
        material: { rot: 0, scale: 1, color: "#ffffff" },
        vector: { color: "#ffffff", weight: 3, arrow: true },
        zone: { color: "#ffa500", w: 150, h: 100 }
    };

    const fMaster = document.getElementById('field-master');
    const svg = document.getElementById('svg-layer');

    function render() {
        Array.from(fMaster.children).forEach(c => { if(c.id !== 'svg-layer') c.remove(); });
        svg.querySelectorAll('.v-el').forEach(e => e.remove());
        steps[curStep].forEach(el => {
            if(el.type === 'vec') drawVector(el);
            else if(el.type === 'zone') drawZone(el);
            else drawPhysical(el);
        });
        document.getElementById('step-label').innerText = `${curStep+1}/${steps.length}`;
        updateInspector();
    }

    // --- GESTIÓN DE EVENTOS MAESTRA (Modo Trackpad) ---
    function handleViewportDown(e) {
        if(isPlaying) return;
        
        // ¿Estamos tocando un objeto o nodo directamente?
        const hitObject = e.target.closest('.object, .vec-hit, .zone, .node');
        
        if(hitObject && hitObject.dataset.id) {
            activeId = Number(hitObject.dataset.id);
            const el = steps[curStep].find(o => o.id === activeId);
            
            const rect = fMaster.getBoundingClientRect();
            const zoom = rect.width / fMaster.offsetWidth;

            dragInfo = { 
                el, 
                nx: hitObject.dataset.nx || 'x', 
                ny: hitObject.dataset.ny || 'y', 
                isZS: hitObject.classList.contains('node-zs'),
                moved: false, 
                lastX: e.clientX, 
                lastY: e.clientY, 
                zoom 
            };
            render();
        } else if(activeId) {
            // Si hay algo seleccionado, permitimos moverlo desde el fondo (Trackpad)
            const el = steps[curStep].find(o => o.id === activeId);
            const rect = fMaster.getBoundingClientRect();
            dragInfo = { el, nx:'x', ny:'y', moved:false, lastX:e.clientX, lastY:e.clientY, zoom: rect.width / fMaster.offsetWidth };
        }
    }

    function handleViewportMove(e) {
        if(!dragInfo || pinchDist > 0) return;
        dragInfo.moved = true;
        const dx = (e.clientX - dragInfo.lastX) / dragInfo.zoom;
        const dy = (e.clientY - dragInfo.lastY) / dragInfo.zoom;

        if(dragInfo.isZS) {
            dragInfo.el.w = Math.max(30, dragInfo.el.w + dx);
            dragInfo.el.h = Math.max(30, dragInfo.el.h + dy);
            dna.zone.w = dragInfo.el.w; dna.zone.h = dragInfo.el.h;
        } else if(dragInfo.el.type === 'vec' && dragInfo.nx === 'x') {
            ['x1','x2','cx1','cx2'].forEach(k => dragInfo.el[k]+=dx);
            ['y1','y2','cy1','cy2'].forEach(k => dragInfo.el[k]+=dy);
        } else {
            dragInfo.el[dragInfo.nx] += dx;
            dragInfo.el[dragInfo.ny] += dy;
        }
        dragInfo.lastX = e.clientX; dragInfo.lastY = e.clientY;
        render();
    }

    function handleViewportEnd() {
        if(dragInfo && !dragInfo.moved && dragInfo.nx === 'x' && !['zone','vec'].includes(dragInfo.el.type)) {
            dragInfo.el.rot = (dragInfo.el.rot + 45) % 360; 
            if(dragInfo.el.type.startsWith('p-')) dna.player.rot = dragInfo.el.rot;
            else dna.material.rot = dragInfo.el.rot;
        }
        dragInfo = null; render();
    }

    // --- CREACIÓN ---
    function createPlayer(type) {
        const id = Date.now();
        steps[curStep].push({ id, type, x: 100, y: 100, rot: dna.player.rot, scale: dna.player.scale, num: steps[curStep].filter(o=>o.type===type).length+1 });
        activeId = id; render();
    }
    function createItem(type) {
        const id = Date.now();
        steps[curStep].push({ id, type, x: 150, y: 150, rot: dna.material.rot, scale: dna.material.scale, color: (type==='cone' && dna.material.color==='#ffffff' ? '#e67e22' : dna.material.color) });
        activeId = id; render();
    }
    function createVector(sub) {
        const id = Date.now();
        steps[curStep].push({ id, type: 'vec', sub, x1: 50, y1: 50, x2: 150, y2: 50, cx1: 75, cy1: 100, cx2: 125, cy2: 100, color: dna.vector.color, weight: dna.vector.weight, arrow: dna.vector.arrow });
        activeId = id; render();
    }
    function createZone(sub) {
        const id = Date.now();
        steps[curStep].push({ id, type: 'zone', sub, x: 100, y: 100, w: dna.zone.w, h: dna.zone.h, color: dna.zone.color });
        activeId = id; render();
    }
    function duplicateActive() {
        if(!activeId) return;
        const target = steps[curStep].find(o => o.id === activeId);
        const clone = JSON.parse(JSON.stringify(target));
        clone.id = Date.now(); clone.x += 30; clone.y += 30;
        if(clone.num) clone.num = steps[curStep].filter(o=>o.type===clone.type).length + 1;
        steps[curStep].push(clone); activeId = clone.id; render();
    }

    // --- DIBUJO ---
    function drawPhysical(el) {
        const div = document.createElement('div');
        div.className = `object ${el.type} ${activeId === el.id ? 'selected' : ''}`;
        div.dataset.id = el.id;
        if(el.type.startsWith('p-')) {
            const colors = {'p-red':'#ff4757', 'p-blue':'#2e86de', 'p-yellow':'#f1c40f', 'p-green':'#2ecc71'};
            div.style.background = colors[el.type]; div.innerText = el.num; div.classList.add('player');
        } else if(el.type === 'ball') div.innerText = '⚽';
        else {
            div.classList.add(el.type);
            if(el.type === 'cone') div.style.borderBottomColor = el.color;
            else div.style.borderColor = el.color; div.style.color = el.color;
        }
        div.style.left = el.x + 'px'; div.style.top = el.y + 'px';
        div.style.transform = `translate(-50%, -50%) rotate(${el.rot}deg) scale(${el.scale})`;
        fMaster.appendChild(div);
    }

    function drawVector(el) {
        const d = el.sub==='curve' ? `M ${el.x1} ${el.y1} C ${el.cx1} ${el.cy1}, ${el.cx2} ${el.cy2}, ${el.x2} ${el.y2}` : `M ${el.x1} ${el.y1} L ${el.x2} ${el.y2}`;
        const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
        hit.setAttribute("d", d); hit.setAttribute("class", "vec-hit v-el"); hit.dataset.id = el.id;
        svg.appendChild(hit);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d); path.setAttribute("class", "v-el");
        path.setAttribute("stroke", el.color); path.setAttribute("stroke-width", el.weight); path.setAttribute("fill", "none");
        if(el.arrow) path.setAttribute("marker-end", "url(#arrow)");
        svg.appendChild(path);
        if(activeId === el.id) {
            [['x1','y1'], ['x2','y2']].forEach(([nx, ny]) => createNode(el, nx, ny, el[nx], el[ny]));
            if(el.sub==='curve') [['cx1','cy1'], ['cx2','cy2']].forEach(([nx, ny]) => createNode(el, nx, ny, el[nx], el[ny], true));
        }
    }

    function drawZone(el) {
        const div = document.createElement('div');
        div.className = `zone ${el.sub==='fill'?'zone-fill':'zone-line'} ${activeId === el.id ? 'selected' : ''}`;
        div.dataset.id = el.id;
        div.style.cssText = `left:${el.x}px; top:${el.y}px; width:${el.w}px; height:${el.h}px; border-color:${el.color};`;
        if(el.sub === 'fill') div.style.backgroundColor = el.color + '66';
        fMaster.appendChild(div);
        if(activeId === el.id) createNode(el, 'w', 'h', el.x + el.w, el.y + el.h, false, true);
    }

    function createNode(el, nx, ny, fx, fy, isC=false, isZS=false) {
        const node = document.createElement('div'); node.className = `node ${isZS?'node-zs':''}`; 
        node.style.left = fx+'px'; node.style.top = fy+'px'; node.dataset.id = el.id; node.dataset.nx = nx; node.dataset.ny = ny;
        node.innerHTML = `<div class="node-in" style="${isC?'background:cyan':''}"></div>`;
        fMaster.appendChild(node);
    }

    // --- PELLIZCO (Zoom individual de cualquier objeto) ---
    fMaster.addEventListener('touchstart', (e) => {
        if(e.touches.length === 2 && activeId) pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }, {passive: false});

    fMaster.addEventListener('touchmove', (e) => {
        if(pinchDist > 0 && e.touches.length === 2) {
            const el = steps[curStep].find(o=>o.id === activeId);
            if(el) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                el.scale *= (dist / pinchDist); pinchDist = dist;
                if(el.type.startsWith('p-')) dna.player.scale = el.scale; else dna.material.scale = el.scale;
                render();
            }
        }
    }, {passive: false});

    fMaster.addEventListener('touchend', () => pinchDist = 0);

    // --- UTILIDADES ---
    function modifyProp(p, v) { 
        const el = steps[curStep].find(o=>o.id===activeId); if(el) { el[p]=v; if(el.type.startsWith('p-')) dna.player[p]=v; else if(el.type==='vec') dna.vector[p]=v; else if(el.type==='zone') dna.zone[p]=v; else dna.material[p]=v; render(); }
    }
    function updateInspector() { const ins = document.getElementById('top-inspector'); if(!activeId) { ins.style.display = 'none'; return; } ins.style.display = 'flex'; document.getElementById('ins-vec-extras').style.display = (steps[curStep].find(o=>o.id===activeId).type==='vec')?'flex':'none'; }
    function exportStepPNG() { deselect(); setTimeout(() => html2canvas(fMaster, {backgroundColor:null, scale:2, useCORS:true}).then(c=>{const a=document.createElement('a');a.download=`tactica_${curStep+1}.png`;a.href=c.toDataURL();a.click();}), 100); }
    
    let isPlaying = false;
    async function runAnimation() {
        if(steps.length < 2) return; isPlaying = true; deselect();
        for(let i=0; i < steps.length-1; i++) {
            await new Promise(res => {
                let s = null; const f1 = steps[i], f2 = steps[i+1];
                function animate(ts) {
                    if(!s) s = ts; const p = Math.min((ts-s)/800, 1);
                    Array.from(fMaster.children).forEach(c => { if(c.id !== 'svg-layer') c.remove(); });
                    f1.forEach(o => {
                        const t = f2.find(x => x.id === o.id); if(!t || o.type==='vec' || o.type==='zone') return;
                        const div = document.createElement('div'); div.className=`object ${o.type}`; if(o.type.startsWith('p-')) div.classList.add('player');
                        div.style.left=(o.x+(t.x-o.x)*p)+'px'; div.style.top=(o.y+(t.y-o.y)*p)+'px';
                        div.style.transform=`translate(-50%,-50%) rotate(${o.rot+(t.rot-o.rot)*p}deg) scale(${o.scale})`;
                        fMaster.appendChild(div);
                    });
                    if(p < 1) requestAnimationFrame(animate); else res();
                }
                requestAnimationFrame(animate);
            });
        }
        isPlaying = false; render();
    }
    function addStep() { steps.push(JSON.parse(JSON.stringify(steps[curStep]))); curStep++; render(); }
    function navStep(d) { curStep = Math.max(0, Math.min(steps.length-1, curStep+d)); deselect(); }
    function removeActive() { if(activeId) { steps[curStep] = steps[curStep].filter(o=>o.id!==activeId); deselect(); } }
    function deselect() { activeId = null; render(); }
    window.onload = render;
</script>
</body>
</html>
