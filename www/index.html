<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v3</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --top: #161d23; --grass: #27ae60; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }

        /* UI */
        #top-bar { height: 50px; background: var(--top); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 100; border-bottom: 1px solid #000; }
        #main { display: flex; height: calc(100% - 50px); width: 100%; }
        #sidebar { width: 75px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; z-index: 10; }
        
        .cat-label { font-size: 8px; color: #84817a; text-align: center; padding: 8px 0 2px; text-transform: uppercase; font-weight: bold; }
        .tool { width: 45px; height: 45px; margin: 4px auto; border-radius: 8px; border: 1px solid #3d3d3d; background: #2d3436; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; cursor: pointer; }

        /* Canvas Area */
        #field-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; background: #111; padding: 10px; position: relative; }
        #field-canvas { 
            position: relative; width: 100%; height: 100%; max-width: 1100px; max-height: 750px;
            background: var(--grass) url('campoentero.png') no-repeat center / contain;
            box-shadow: 0 0 40px rgba(0,0,0,0.6); overflow: hidden; 
        }
        
        /* Elements */
        .object { position: absolute; transform: translate(-50%, -50%); z-index: 20; display: flex; align-items: center; justify-content: center; user-select: none; pointer-events: auto; }
        .player { width: 36px; height: 36px; border-radius: 50%; border: 2px solid white; font-weight: bold; font-size: 13px; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .player::after { content: ''; position: absolute; top: -10px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 8px solid white; }
        .selected { outline: 2px dashed yellow; outline-offset: 5px; z-index: 30 !important; }

        /* Nodes */
        .node { position: absolute; width: 28px; height: 28px; z-index: 100; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .node-inner { width: 12px; height: 12px; background: white; border: 2px solid var(--accent); border-radius: 50%; box-shadow: 0 0 5px black; }
        .node-inner.curve { background: cyan; }

        /* Vector Layer */
        .line-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }

        /* Config */
        #config-panel { position: absolute; top: 0; right: -280px; width: 260px; height: 100%; background: var(--panel); border-left: 2px solid #000; transition: 0.3s; z-index: 500; padding: 20px; color: white; }
        #config-panel.open { right: 0; }
        .btn { background: #2d3436; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="display: flex; gap: 6px; align-items: center;">
        <button class="btn" onclick="changeFrame(-1)">◀</button>
        <b id="frame-info" style="font-size:12px; min-width:35px; text-align:center;">1/1</b>
        <button class="btn" onclick="changeFrame(1)">▶</button>
        <button class="btn" style="background:var(--accent)" onclick="addFrame()">+ PASO</button>
        <button class="btn" style="background:#2ecc71" onclick="playAnim()">PLAY</button>
    </div>
    <div style="display: flex; gap: 6px;">
        <button class="btn" onclick="toggleConfig()">⚙️ AJUSTES</button>
        <button class="btn" style="background:#e74c3c" onclick="location.reload()">RESET</button>
    </div>
</div>

<div id="main">
    <div id="sidebar">
        <div class="cat-label">EQUIPOS</div>
        <div class="tool" onclick="addObj('p-red')" style="background:#ff4757">1</div>
        <div class="tool" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
        <div class="tool" onclick="addObj('p-yellow')" style="background:#f1c40f; color:0">1</div>
        <div class="tool" onclick="addObj('p-white')" style="background:#fff; color:0">1</div>
        
        <div class="cat-label">MATERIAL</div>
        <div class="tool" onclick="addObj('ball')">⚽</div>
        <div class="tool" onclick="addObj('cone')">▲</div>
        <div class="tool" onclick="addObj('ladder')">🪜</div>
        <div class="tool" onclick="addObj('valla')">⊓</div>

        <div class="cat-label">LÍNEAS</div>
        <div class="tool" onclick="addVec('line')">⎯</div>
        <div class="tool" onclick="addVec('curve')">⤴</div>
        
        <div class="cat-label">ZONAS</div>
        <div class="tool" onclick="addObj('z-line')">⬜</div>
        <div class="tool" onclick="addObj('z-fill')">🟩</div>
    </div>
    
    <div id="field-wrapper" onclick="closeSettings()">
        <div id="field-canvas">
            <svg class="line-svg" id="svg-layer">
                <defs>
                    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="white" />
                    </marker>
                </defs>
            </svg>
        </div>
    </div>

    <div id="config-panel" onclick="event.stopPropagation()">
        <h3>Ajustes</h3>
        <label style="font-size:10px; color:var(--accent)">ESCALA JUGADORES</label>
        <input type="range" id="pScale" min="0.5" max="2" step="0.1" value="1" oninput="render()">
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        <label style="font-size:10px; color:var(--accent)">VELOCIDAD ANIMACIÓN</label>
        <input type="range" id="aSpeed" min="200" max="2000" value="800">
        <button class="btn" style="width:100%; margin-top:20px;" onclick="toggleConfig()">CERRAR</button>
    </div>
</div>

<script>
    let frames = [ [] ];
    let curF = 0;
    let selId = null;
    let dragData = null;
    let lastDist = 0; // Para pellizco

    const canvas = document.getElementById('field-canvas');
    const svg = document.getElementById('svg-layer');

    function addObj(type) {
        const id = Date.now();
        const obj = { id, type, x: 150, y: 150, rot: 0, scale: 1, num: frames[curF].filter(o=>o.type===type).length+1 };
        frames[curF].push(obj);
        selId = id; render();
    }

    function addVec(sub) {
        const id = Date.now();
        const vec = { id, type: 'vec', sub, x1:100, y1:200, x2:300, y2:200, cx1:150, cy1:100, cx2:250, cy2:300, scale:1 };
        frames[curF].push(vec);
        selId = id; render();
    }

    function render() {
        Array.from(canvas.children).forEach(c => { if(c.id !== 'svg-layer') c.remove(); });
        svg.querySelectorAll('.v-el').forEach(e => e.remove());
        const pScale = document.getElementById('pScale').value;

        frames[curF].forEach(el => {
            if(el.type === 'vec') drawVector(el);
            else drawPhysical(el, pScale);
        });
        document.getElementById('frame-info').innerText = `${curF+1}/${frames.length}`;
    }

    function drawPhysical(el, pScale) {
        const div = document.createElement('div');
        div.className = `object ${selId === el.id ? 'selected' : ''}`;
        const s = el.type.startsWith('p-') ? pScale : el.scale;

        if(el.type.startsWith('p-')) {
            div.classList.add('player');
            const colors = {'p-red':'#ff4757', 'p-blue':'#2e86de', 'p-yellow':'#f1c40f', 'p-white':'#fff'};
            div.style.background = colors[el.type];
            div.style.color = (el.type === 'p-white' || el.type === 'p-yellow') ? 'black' : 'white';
            div.innerText = el.num;
        } else if(el.type === 'ball') {
            div.innerText = '⚽'; div.style.fontSize = (20*s)+'px';
        } else if(el.type === 'ladder') {
            div.style.width = (120*s)+'px'; div.style.height = (40*s)+'px';
            div.style.border = '2px solid #fff'; div.style.background = 'repeating-linear-gradient(90deg, transparent, transparent 20px, #fff 20px, #fff 22px)';
        } else if(el.type === 'valla') {
            div.style.width = (40*s)+'px'; div.style.height = (15*s)+'px';
            div.style.border = '3px solid #fff'; div.style.borderBottom = 'none'; div.style.borderRadius = '4px 4px 0 0';
        } else if(el.type.startsWith('z-')) {
            div.style.width = (100*s)+'px'; div.style.height = (60*s)+'px';
            div.style.border = '2px dashed #fff';
            if(el.type === 'z-fill') div.style.background = 'rgba(255,255,255,0.2)';
        } else if(el.type === 'cone') {
            div.style.width = '0'; div.style.height = '0';
            div.style.borderLeft = (10*s)+'px solid transparent'; div.style.borderRight = (10*s)+'px solid transparent';
            div.style.borderBottom = (20*s)+'px solid #e67e22';
        }

        div.style.left = el.x + 'px'; div.style.top = el.y + 'px';
        div.style.transform = `translate(-50%, -50%) rotate(${el.rot}deg)`;
        div.onpointerdown = (e) => startDrag(e, el, 'center');
        canvas.appendChild(div);
    }

    function drawVector(el) {
        const d = el.sub==='curve' ? `M ${el.x1} ${el.y1} C ${el.cx1} ${el.cy1}, ${el.cx2} ${el.cy2}, ${el.x2} ${el.y2}` : `M ${el.x1} ${el.y1} L ${el.x2} ${el.y2}`;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d); path.setAttribute("class", "v-el");
        path.setAttribute("stroke", selId === el.id ? "yellow" : "white");
        path.setAttribute("stroke-width", "3"); path.setAttribute("fill", "none");
        path.setAttribute("marker-end", "url(#arrow)");
        svg.appendChild(path);

        if(selId === el.id) {
            [['x1','y1'], ['x2','y2']].forEach(([nx, ny]) => createNode(el, nx, ny));
            if(el.sub === 'curve') [['cx1','cy1'], ['cx2','cy2']].forEach(([nx, ny]) => createNode(el, nx, ny, true));
        }
    }

    function createNode(el, nx, ny, isC = false) {
        const node = document.createElement('div');
        node.className = 'node';
        node.style.left = el[nx] + 'px'; node.style.top = el[ny] + 'px';
        node.innerHTML = `<div class="node-inner ${isC?'curve':''}"></div>`;
        node.onpointerdown = (e) => startDrag(e, el, nx, ny);
        canvas.appendChild(node);
    }

    function startDrag(e, el, nx, ny = null) {
        e.preventDefault(); e.stopPropagation();
        selId = el.id; dragData = { el, nx, ny, moved: false };
        const rect = canvas.getBoundingClientRect();
        const startX = ny ? el[nx] : el.x;
        const startY = ny ? el[ny] : el.y;
        const offX = (e.clientX - rect.left) - startX;
        const offY = (e.clientY - rect.top) - startY;

        window.onpointermove = (ev) => {
            dragData.moved = true;
            const mx = (ev.clientX - rect.left) - offX;
            const my = (ev.clientY - rect.top) - offY;
            if(ny) { el[nx] = mx; el[ny] = my; } else { el.x = mx; el.y = my; }
            render();
        };
        window.onpointerup = () => {
            if(!dragData.moved && nx === 'center') { el.rot = (el.rot+45)%360; render(); }
            window.onpointermove = window.onpointerup = null;
        };
    }

    // Pellizco para escalar no-jugadores
    canvas.addEventListener('touchstart', (e) => {
        if(e.touches.length === 2 && selId) {
            lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if(e.touches.length === 2 && selId) {
            const el = frames[curF].find(o => o.id === selId);
            if(el && !el.type.startsWith('p-')) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                el.scale *= (dist / lastDist);
                lastDist = dist; render();
            }
        }
    }, {passive: false});

    async function playAnim() {
        if(frames.length < 2) return;
        const speed = parseInt(document.getElementById('aSpeed').value);
        for(let i=0; i<frames.length-1; i++) {
            await new Promise(res => {
                let start = null;
                const f1 = frames[i], f2 = frames[i+1];
                function step(ts) {
                    if(!start) start = ts;
                    const p = Math.min((ts - start) / speed, 1);
                    // Render interpolado simplificado
                    if(p < 1) requestAnimationFrame(step); else res();
                }
                requestAnimationFrame(step);
            });
        }
    }

    function addFrame() { frames.push(JSON.parse(JSON.stringify(frames[curF]))); curF++; render(); }
    function changeFrame(d) { curF = Math.max(0, Math.min(frames.length-1, curF+d)); render(); }
    function toggleConfig() { document.getElementById('config-panel').classList.toggle('open'); }
    function closeSettings() { document.getElementById('config-panel').classList.remove('open'); selId=null; render(); }

    window.onload = () => { render(); };
</script>
</body>
</html>
