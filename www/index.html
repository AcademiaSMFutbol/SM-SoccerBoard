<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v44</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#12171b">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app-root">
        <div id="top-bar">
            <div class="btn-group">
                <button class="btn" onclick="undo()">⟲</button>
                <button class="btn btn-danger" onclick="openResetMenu()">✨</button>
                <div class="divider"></div>
                <button class="btn" onclick="navStep(-1)">◀</button>
                <span id="step-label">1/1</span>
                <button class="btn" onclick="navStep(1)">▶</button>
                <button class="btn btn-accent" onclick="addStep()">+ PASO</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-play" onclick="runAnimation()">▶ PLAY</button>
                <button class="btn btn-save" onclick="exportStepPNG()">💾 PNG</button>
                <button id="btn-mp4" class="btn" onclick="exportVideo()" style="background:#c0392b; color:#fff;">🎬 MP4</button>
                <button class="btn btn-danger" onclick="removeActive()">🗑️</button>
            </div>
        </div>

        <div id="reset-modal" class="modal-overlay">
            <div class="modal-content reset-menu">
                <h3>Opciones de Reinicio</h3>
                <button class="btn btn-dark" onclick="resetAction('step')">LIMPIAR PASO ACTUAL</button>
                <button class="btn btn-danger" onclick="resetAction('project')">BORRAR PROYECTO COMPLETO</button>
                <button class="btn close-btn" onclick="closeResetMenu()">CANCELAR</button>
            </div>
        </div>

        <div id="text-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>Insertar Nota</h3>
                <input type="text" id="text-input-field" placeholder="Escribe aquí..." class="custom-input">
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn btn-accent" style="flex:1" onclick="confirmCreateText()">OK</button>
                    <button class="btn btn-dark" style="flex:1" onclick="closeTextModal()">SALIR</button>
                </div>
            </div>
        </div>

        <div id="main-layout">
            <div id="sidebar-left">
                <div class="cat-label">Trazos</div>
                <div class="tool" onclick="createVector('line')">⎯</div>
                <div class="tool" onclick="createVector('curve')">⤴</div>
                <div class="tool" onclick="openTextModal()">T</div>
                <div class="cat-label">Equipos</div>
                <div id="tool-p-red" class="tool" onclick="createPlayer('p-red')" style="background:#ff4757">1</div>
                <div id="tool-p-blue" class="tool" onclick="createPlayer('p-blue')" style="background:#2e86de">1</div>
                <div id="tool-p-yellow" class="tool" onclick="createPlayer('p-yellow')" style="background:#f1c40f; color:#000;">1</div>
                <div id="tool-p-green" class="tool" onclick="createPlayer('p-green')" style="background:#2ecc71">1</div>
                <div class="cat-label">Zonas</div>
                <div class="tool" onclick="createZone('fill')">🟩</div>
                <div class="tool" onclick="createZone('line')">⬜</div>
                <div class="cat-label">Material</div>
                <div class="tool" onclick="createItem('ball')">⚽</div>
                <div class="tool" onclick="createItem('cone')">▲</div>
                <div class="tool" onclick="createItem('pica')">┃</div>
                <div class="tool" onclick="createItem('valla')">⊓</div>
                <div class="tool" onclick="createItem('ladder')">🪜</div>
            </div>

            <div id="viewport" onpointerdown="handleGlobalDown(event)" onpointermove="handleGlobalMove(event)" onpointerup="handleGlobalEnd()">
                <div id="field-master">
                    <svg id="svg-layer">
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" />
                            </marker>
                        </defs>
                    </svg>
                </div>
            </div>

            <div id="sidebar-right">
                <div id="inspector-panel" style="display:none">
                    <div class="panel-header">EDICIÓN</div>
                    <div class="side-item">
                        <label>COLOR</label>
                        <input type="color" id="ins-color" oninput="modifyProp('color', this.value)">
                    </div>
                    <div id="ins-text-box" class="side-item" style="display:none">
                        <label>CONTENIDO</label>
                        <input type="text" id="ins-text-val" oninput="modifyProp('content', this.value)" class="custom-input small">
                    </div>
                    <div id="ins-zone-lock" class="side-item" style="display:none">
                        <button id="lock-btn" class="btn btn-dark w-100" onclick="toggleZoneLock()"></button>
                    </div>
                    <div id="ins-vec-extras" style="display:none">
                        <div class="side-item">
                            <label>ESTILO LÍNEA</label>
                            <select id="ins-line-type" onchange="modifyProp('lineType', this.value)">
                                <option value="solid">Balón</option>
                                <option value="dashed">Jugador</option>
                            </select>
                        </div>
                        <div class="side-item flex-row">
                            <label>FLECHA</label>
                            <input type="checkbox" id="ins-arrow" onchange="modifyProp('arrow', this.checked)">
                        </div>
                    </div>
                    <button class="btn btn-accent w-100" onclick="duplicateActive()">➕ DUPLICAR</button>
                    <button class="btn btn-dark w-100" style="margin-top:10px" onclick="deselect()">OK / CERRAR</button>
                    <div class="divider" style="margin: 20px 0"></div>
                </div>

                <div class="panel-header">AJUSTES</div>
                <div class="side-item">
                    <label>VELOCIDAD PLAY</label>
                    <input type="range" min="200" max="2000" step="100" value="800" oninput="updateSpeed(this.value)">
                </div>
                <div class="side-item flex-row">
                    <label>FULLSCREEN</label>
                    <input type="checkbox" id="force-fs-check" onchange="setForceFS(this.checked)">
                </div>
                <div class="side-item">
                    <label>CAMPO</label>
                    <select onchange="changeField(this.value)">
                        <option value="entero">Completo</option>
                        <option value="medio">Medio</option>
                        <option value="ejercicio">Ejercicio</option>
                    </select>
                </div>
                <div class="side-item">
                    <label>EQUIPOS</label>
                    <div class="team-grid-side">
                        <input type="color" value="#ff4757" oninput="updateTeamColor('p-red', this.value)">
                        <input type="color" value="#2e86de" oninput="updateTeamColor('p-blue', this.value)">
                        <input type="color" value="#f1c40f" oninput="updateTeamColor('p-yellow', this.value)">
                        <input type="color" value="#2ecc71" oninput="updateTeamColor('p-green', this.value)">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
