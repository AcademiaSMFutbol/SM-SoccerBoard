<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>SMBoard Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="topbar">
    <div class="tg"><div class="logo">⚽ <span>SM</span>Board</div></div>
    <div class="tg">
      <button class="btn bi" onclick="navStep(-1)">◀</button>
      <span id="step-label">1 / 1</span>
      <button class="btn bi" onclick="navStep(1)">▶</button>
      <button class="btn ba" onclick="addStep()">+ PASO</button>
    </div>
    <div class="tg" id="poly-ind" style="display:none"><span class="poly-badge">✍ POLÍGONO</span></div>
    <div class="tg">
      <button class="btn bu" onclick="openLibrary()" title="Biblioteca">📚</button>
      <button class="btn bs" onclick="saveToLocal()" title="Guardar en mi Biblioteca">💾 GUARDAR</button>
      <button class="btn bu" onclick="undo()" title="Deshacer">⟲</button>
      <button class="btn bp" onclick="runAnimation()">▶ PLAY</button>
      <button class="btn bs" onclick="exportPNG()">PNG</button>
      <button class="btn bm" onclick="exportVideo()">🎬</button>
      <button class="btn bu" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
      <button class="btn bd" onclick="openResetMenu()">🗑</button>
    </div>
  </header>

  <div id="layout">

    <aside id="left">
      <div class="cat">DIBUJO</div>
      <button class="tool" onclick="createVector('line')"><span class="ti">⎯</span><span class="tl">Línea</span></button>
      <button class="tool" onclick="createVector('curve')"><span class="ti">⤴</span><span class="tl">Curva</span></button>
      <button class="tool" onclick="startPolyMode()"><span class="ti">⟁</span><span class="tl">Poly</span></button>
      <button class="tool" onclick="createTextEl()"><span class="ti" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;">T</span><span class="tl">Texto</span></button>

      <div class="cat">ZONAS</div>
      <button class="tool" onclick="createZone('fill')"><span class="ti zone-fill-i"></span><span class="tl">Relleno</span></button>
      <button class="tool" onclick="createZone('line')"><span class="ti zone-line-i"></span><span class="tl">Marco</span></button>

      <div class="cat">EQUIPOS</div>
      <button class="tool" onclick="createPlayer('A')"><span class="ti pdot" id="dot-A">A</span><span class="tl">Eq. A</span></button>
      <button class="tool" onclick="createPlayer('B')"><span class="ti pdot" id="dot-B">B</span><span class="tl">Eq. B</span></button>
      <button class="tool" onclick="createPlayer('C')"><span class="ti pdot" id="dot-C">C</span><span class="tl">Eq. C</span></button>
      <button class="tool" onclick="createPlayer('D')"><span class="ti pdot" id="dot-D">D</span><span class="tl">Eq. D</span></button>

      <div class="cat">MATERIAL</div>
      <button class="tool" onclick="createItem('ball')"><span class="ti">⚽</span><span class="tl">Balón</span></button>
      <button class="tool" onclick="createItem('cone_low')"><span class="ti cone-low-i"></span><span class="tl">Chita</span></button>
      <button class="tool" onclick="createItem('cone')"><span class="ti cone-i"></span><span class="tl">Cono</span></button>
      <button class="tool" onclick="createItem('pica')"><span class="ti pica-i"></span><span class="tl">Pica</span></button>
      <button class="tool" onclick="createItem('aro')"><span class="ti" style="font-size:22px">⭕</span><span class="tl">Aro</span></button>
      <button class="tool" onclick="createItem('valla')"><span class="ti valla-i"></span><span class="tl">Valla</span></button>
      <button class="tool" onclick="createItem('ladder')"><span class="ti ladder-i"></span><span class="tl">Escal.</span></button>
      <button class="tool" onclick="createItem('weight')"><span class="ti weight-i"></span><span class="tl">Peso</span></button>
    </aside>

    <section id="vp">
      <div id="field-master">
        <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
      </div>
    </section>

    <aside id="right">
      <div id="inspector" style="display:none">
        <div class="cat">EDITOR</div>
        <div class="irow" id="r-color"><span>Color</span><input type="color" id="ins-color" oninput="setProp('color',this.value)"></div>
        <div class="irow" id="r-stripe" style="display:none"><span>Color 2</span><input type="color" id="ins-stripe" oninput="setProp('stripeColor',this.value)"></div>
        <div class="irow" id="r-strtog" style="display:none"><span>Rayas</span><label class="tog"><input type="checkbox" id="ins-strtog" onchange="toggleStripe(this.checked)"><span class="tslider"></span></label></div>
        <div class="irow" id="r-num" style="display:none"><span>Nº</span><input type="number" id="ins-num" min="1" max="99" oninput="setProp('num',+this.value)" style="width:50px;background:#2d3436;color:#fff;border:1px solid #444;border-radius:5px;padding:3px 7px;font-size:13px;"></div>
        <div class="irow" id="r-numcolor" style="display:none"><span>Color dorsal</span><input type="color" id="ins-numcolor" value="#ffffff" oninput="setProp('numColor',this.value)"></div>
        <div class="irow" id="r-arrow" style="display:none"><span>Flecha</span><label class="tog"><input type="checkbox" id="ins-arrow" onchange="setProp('arrow',this.checked)"><span class="tslider"></span></label></div>
        <div class="irow" id="r-dash" style="display:none"><span>Punteada</span><label class="tog"><input type="checkbox" id="ins-dash" onchange="setProp('dashed',this.checked)"><span class="tslider"></span></label></div>
        <div class="irow" id="r-lock" style="display:none"><span>🔒 Bloquear</span><label class="tog"><input type="checkbox" id="ins-lock" onchange="toggleLock(this.checked)"><span class="tslider"></span></label></div>
        <button class="btn ba w100" onclick="dupActive()" style="margin-top:8px">➕ DUPLICAR</button>
        <button class="btn bd w100" onclick="delActive()" style="margin-top:5px">🗑 BORRAR</button>
        <button class="btn" id="btn-fpoly" style="display:none;margin-top:5px;background:#f1c40f;color:#000;width:100%" onclick="finishPoly()">✓ FINALIZAR</button>
        <button class="btn w100" style="margin-top:5px;opacity:.6" onclick="deselect()">CERRAR</button>
        <hr>
      </div>

      <div class="cat">ANIMACIÓN</div>
      <div class="spd">
        <span>🐢</span>
        <input type="range" id="speed-slider" min="300" max="3000" value="900" step="100" oninput="updateSpeedLabel()">
        <span>🐇</span>
      </div>
      <div style="text-align:center;font-size:11px;color:#666;margin-top:3px"><span id="speed-val">900ms</span></div>

      <div class="cat" style="margin-top:14px">EQUIPOS</div>
      <div class="teq">
        <div class="tr"><div class="tsw" id="sw-A"></div><span>A</span><input type="color" id="cA1" value="#e63946" oninput="setTeamColor('A','c1',this.value)"><input type="color" id="cA2" value="#ffffff" oninput="setTeamColor('A','c2',this.value)"></div>
        <div class="tr"><div class="tsw" id="sw-B"></div><span>B</span><input type="color" id="cB1" value="#2e86de" oninput="setTeamColor('B','c1',this.value)"><input type="color" id="cB2" value="#ffffff" oninput="setTeamColor('B','c2',this.value)"></div>
        <div class="tr"><div class="tsw" id="sw-C"></div><span>C</span><input type="color" id="cC1" value="#f1c40f" oninput="setTeamColor('C','c1',this.value)"><input type="color" id="cC2" value="#000000" oninput="setTeamColor('C','c2',this.value)"></div>
        <div class="tr"><div class="tsw" id="sw-D"></div><span>D</span><input type="color" id="cD1" value="#2ecc71" oninput="setTeamColor('D','c1',this.value)"><input type="color" id="cD2" value="#ffffff" oninput="setTeamColor('D','c2',this.value)"></div>
      </div>

      <div class="cat" style="margin-top:14px">TAMAÑO JUGADORES</div>
      <div class="spd">
        <span style="font-size:12px;font-weight:bold;">A</span>
        <input type="range" id="global-p-scale" min="0.4" max="2.5" value="1" step="0.1" oninput="setGlobalScale(this.value)">
        <span style="font-size:18px;font-weight:bold;">A</span>
      </div>

      <div class="cat" style="margin-top:14px">CAMPO</div>
      <select class="sel" onchange="setField(this.value)">
        <option value="full">Campo Completo</option>
        <option value="half">Medio Campo</option>
        <option value="futsal">Fútbol Sala</option>
        <option value="blank">Sin líneas</option>
      </select>
    </aside>
  </div>
</div>

<div id="m-lib" class="modal"><div class="mc">
  <div class="mh"><h3>📚 BIBLIOTECA</h3><button class="btn bi" onclick="closeLibrary()">✕</button></div>
  <div id="lib-grid"></div>
  <button class="btn bd w100" style="margin-top:10px" onclick="closeLibrary()">CERRAR</button>
</div></div>

<div id="m-reset" class="modal"><div class="mc">
  <h3>⚠️ Borrar</h3>
  <button class="btn" style="width:100%;margin-top:10px;background:#444" onclick="doReset('step')">LIMPIAR PASO ACTUAL</button>
  <button class="btn bd w100" style="margin-top:8px" onclick="doReset('all')">BORRAR TODO</button>
  <button class="btn w100" style="margin-top:8px;opacity:.6" onclick="closeModal('m-reset')">CANCELAR</button>
</div></div>

<div id="m-export" class="modal"><div class="mc">
  <h3>🎬 EXPORTAR</h3>
  <button class="btn bm w100" style="margin-top:12px;padding:13px;font-size:14px" onclick="startExport('mp4')">🎬 MP4 — PC / Android / iOS</button>
  <p style="color:#555;font-size:10px;margin:3px 0 10px">H.264 · Primera vez descarga ffmpeg (~31MB)</p>
  <button class="btn" style="width:100%;background:#444;padding:11px" onclick="startExport('gif')">🖼 GIF Animado</button>
  <div id="exp-prog" style="display:none;margin-top:14px">
    <div class="pbar"><div id="pbar-fill"></div></div>
    <p id="exp-status" style="text-align:center;font-size:12px;color:#aaa;margin-top:6px"></p>
  </div>
  <button class="btn w100" style="margin-top:12px;opacity:.55" onclick="closeModal('m-export')">CANCELAR</button>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js" defer></script>
<script src="script.js"></script>
</body>
</html>
