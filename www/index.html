<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro</title>
    <style>
        :root { --panel: #1e272e; --accent: #3498db; --grass: #27ae60; --top: #161d23; }
        body { margin: 0; background: #000; color: white; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        #top-bar { height: 55px; background: var(--top); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; border-bottom: 1px solid #000; z-index: 100; flex-shrink: 0; }
        #main-container { display: flex; flex: 1; width: 100%; overflow: hidden; position: relative; }
        #sidebar { width: 75px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #000; overflow-y: auto; flex-shrink: 0; }
        .tool-btn { width: 48px; height: 48px; margin: 4px auto; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #3d3d3d; background: #2d3436; }
        #canvas-wrap { flex: 1; background: var(--grass); position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        /* Panel Ajustes */
        #config-panel { position: absolute; top: 0; right: -280px; width: 260px; height: 100%; background: var(--panel); border-left: 2px solid #000; transition: 0.3s; z-index: 200; padding: 15px; }
        #config-panel.open { right: 0; }
        .top-btn { padding: 8px 10px; border-radius: 4px; border: none; font-weight: bold; color: white; cursor: pointer; background: #2d3436; font-size: 11px; }
    </style>
</head>
<body>
    <div id="top-bar">
        <div style="display:flex; gap:5px;">
            <button class="top-btn" onclick="changeFrame(-1)">◀</button>
            <span id="frame-label" style="font-size:12px; margin-top:8px;">1/1</span>
            <button class="top-btn" onclick="changeFrame(1)">▶</button>
            <button class="top-btn" style="background:var(--accent)" onclick="addFrame()">+</button>
        </div>
        <button class="top-btn" onclick="toggleConfig()">⚙️</button>
    </div>
    <div id="main-container">
        <div id="sidebar">
            <div class="tool-btn" onclick="addObj('p-red')" style="background:#ff4757">1</div>
            <div class="tool-btn" onclick="addObj('p-blue')" style="background:#2e86de">1</div>
            <div class="tool-btn" onclick="addObj('ball')">⚽</div>
        </div>
        <div id="canvas-wrap"><canvas id="field"></canvas></div>
        <div id="config-panel">
            <h3>Configuración APK</h3>
            <label>Tamaño Jugadores</label>
            <input type="range" id="playerSize" min="0.5" max="2" step="0.1" value="1" oninput="render()">
            <button class="top-btn" style="width:100%; margin-top:20px;" onclick="toggleConfig()">CERRAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('field');
        const ctx = canvas.getContext('2d');
        let frames = [[]], curF = 0, selId = null, isMoving = false, draggingAction = null;

        function resize() { 
            canvas.width = canvas.parentElement.clientWidth; 
            canvas.height = canvas.parentElement.clientHeight; 
            render(); 
        }

        // ROTACIÓN DE 8 (45 grados)
        function snapRotation(angle) {
            const step = Math.PI / 4; 
            return Math.round(angle / step) * step;
        }

        function render() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            // Dibujo campo simplificado
            ctx.fillStyle="#27ae60"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle="white"; ctx.strokeRect(10,10,canvas.width-20,canvas.height-20);

            frames[curF].forEach(el => {
                ctx.save();
                ctx.translate(el.x, el.y);
                ctx.rotate(el.rot);
                const s = el.scale * (el.type.startsWith('p-') ? document.getElementById('playerSize').value : 1);
                
                if(el.type.startsWith('p-')) {
                    ctx.beginPath(); ctx.arc(0,0,20*s,0,Math.PI*2);
                    ctx.fillStyle=el.color; ctx.fill(); ctx.stroke();
                    ctx.fillStyle="white"; ctx.fillText(el.num, -5, 5);
                    // Flecha dirección
                    ctx.beginPath(); ctx.moveTo(0,-20*s); ctx.lineTo(-5,-15*s); ctx.lineTo(5,-15*s); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(0,0,10*s,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill();
                }

                if(selId === el.id) {
                    ctx.strokeStyle="yellow"; ctx.lineWidth=2;
                    ctx.strokeRect(-25*s, -25*s, 50*s, 50*s);
                    // Botón rotación manual en el anillo
                    ctx.fillStyle="orange"; ctx.fillRect(25*s, 25*s, 15, 15);
                }
                ctx.restore();
            });
        }

        function addObj(type) {
            const obj = { id:Date.now(), type, x:100, y:100, rot:0, scale:1, color: type==='p-red'?'red':'blue', num:1 };
            frames[curF].push(obj); selId=obj.id; render();
        }

        function handleStart(mx, my) {
            const el = frames[curF].find(e => e.id === selId);
            if(el) {
                const dx = mx - el.x, dy = my - el.y;
                if(dx > 20 && dy > 20) { draggingAction = 'rotate'; return; }
            }
            const found = frames[curF].findLast(e => Math.hypot(e.x-mx, e.y-my) < 30);
            if(found) { 
                if(selId === found.id) found.rot = snapRotation(found.rot + Math.PI/4);
                selId=found.id; isMoving=true; 
            }
            else selId=null;
            render();
        }

        canvas.onmousedown = e => handleStart(e.offsetX, e.offsetY);
        canvas.onmousemove = e => {
            if(!selId) return;
            const el = frames[curF].find(e => e.id === selId);
            if(isMoving) { el.x = e.offsetX; el.y = e.offsetY; }
            if(draggingAction === 'rotate') {
                el.rot = snapRotation(Math.atan2(e.offsetY - el.y, e.offsetX - el.x) + Math.PI/2);
            }
            render();
        };
        window.onmouseup = () => { isMoving=false; draggingAction=null; };
        window.onload = resize;
        function toggleConfig() { document.getElementById('config-panel').classList.toggle('open'); }
        function addFrame() { frames.push(JSON.parse(JSON.stringify(frames[curF]))); curF++; updateUI(); }
        function changeFrame(d) { curF = Math.max(0, Math.min(frames.length-1, curF+d)); updateUI(); }
        function updateUI() { document.getElementById('frame-label').innerText = `${curF+1}/${frames.length}`; render(); }
    </script>
</body>
</html>
