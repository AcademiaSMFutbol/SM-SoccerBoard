<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoccerBoard Pro v57</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app-root">
        <div id="top-bar">
            <div class="btn-group">
                <button class="btn" onclick="navStep(-1)">◀</button>
                <span id="step-label">1/1</span>
                <button class="btn" onclick="navStep(1)">▶</button>
                <button class="btn btn-accent" onclick="addStep()">+ PASO</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-play" onclick="runAnimation()">▶ PLAY</button>
                <button class="btn btn-save" onclick="exportStepPNG()">💾 PNG</button>
                <button class="btn btn-save" onclick="exportMP4()" style="background:#6c5ce7">🎬 MP4</button>
                <button class="btn btn-danger" onclick="openResetMenu()">🗑️</button>
            </div>
        </div>

        <div id="main-layout">
            <div id="sidebar-left">
                <div class="side-nav-group">
                    <button class="btn-side btn-dark" onclick="openLibrary()">📚 BIBLIOTECA</button>
                    <button class="btn-side" onclick="undo()">⟲ DESHACER</button>
                </div>

                <div class="cat-label">Trazos</div>
                <div class="tool" onclick="createVector('line')">⎯</div>
                <div class="tool" onclick="createVector('curve')">⤴</div>
                <div class="tool" onclick="openTextModal()">T</div>
                
                <div class="cat-label">Equipos</div>
                <div id="tool-p-red" class="tool" onclick="createPlayer('p-red')" style="background:#ff4757">1</div>
                <div id="tool-p-blue" class="tool" onclick="createPlayer('p-blue')" style="background:#2e86de">1</div>
                
                <div class="cat-label">Zonas</div>
                <div class="tool" onclick="createZone('fill')">🟩</div>
                <div class="tool" onclick="createZone('line')">⬜</div>
                
                <div class="cat-label">Material</div>
                <div class="tool" onclick="createItem('ball')">⚽</div>
                <div class="tool" onclick="createItem('cone')">▲</div>
                <div class="tool" onclick="createItem('ladder')">🪜</div>
            </div>

            <div id="viewport" onpointerdown="handleGlobalDown(event)" onpointermove="handleGlobalMove(event)" onpointerup="handleGlobalEnd()">
                <div id="field-master">
                    <svg id="svg-layer">
                        <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" /></marker></defs>
                    </svg>
                </div>
            </div>

            <div id="sidebar-right">
                <div id="inspector-panel" style="display:none">
                    <div class="panel-header">EDITOR OBJETO</div>
                    <div class="side-item"><label>COLOR</label><input type="color" id="ins-color" oninput="modifyProp('color', this.value)"></div>
                    <button id="lock-btn" class="btn btn-dark w-100" onclick="toggleZoneLock()"></button>
                    <button class="btn btn-accent w-100" style="margin-top:10px" onclick="duplicateActive()">➕ DUPLICAR</button>
                </div>
                <div class="panel-header">EQUIPOS</div>
                <div class="team-grid-side">
                    <input type="color" value="#ff4757" oninput="updateTeamColor('p-red', this.value)">
                    <input type="color" value="#2e86de" oninput="updateTeamColor('p-blue', this.value)">
                </div>
                <div class="panel-header">CAMPO</div>
                <select class="custom-input" onchange="changeField(this.value)">
                    <option value="entero">Completo</option>
                    <option value="medio">Medio</option>
                </select>
            </div>
        </div>
    </div>

    <div id="library-modal" class="modal-overlay">
        <div class="modal-content lib-content">
            <div class="modal-header"><h3>BIBLIOTECA</h3><button class="btn btn-danger" onclick="closeLibrary()">X</button></div>
            <div class="lib-grid">
                <button class="btn-drill" onclick="injectDrill('rondo42')">Rondo 4x2</button>
                <button class="btn-drill" onclick="injectDrill('y_drill')">Ejercicio en Y (Completo)</button>
                <button class="btn-drill" onclick="injectDrill('slalom')">Slalom Regate</button>
            </div>
        </div>
    </div>

    <div id="reset-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Opciones de Borrado</h3>
            <button class="btn btn-dark w-100" onclick="resetAction('step')">BORRAR PASO ACTUAL</button>
            <button class="btn btn-danger w-100" style="margin-top:10px" onclick="resetAction('project')">BORRAR TODO EL PROYECTO</button>
            <button class="btn w-100" style="margin-top:10px" onclick="closeResetMenu()">CANCELAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
